var PROOF8=[{"title":"시작: T25의 주장을 증명한다","body":"T25은 \"두려움과 소진에서 비롯된 비혼은 T22(회피형)의 극단이며 A2 위반이다\"라고 주장한다. 비혼이 단순한 생활 방식 선택이 아니라 구조적 회피임을 역방향으로 추적한다."},{"title":"역방향 1: 연결 욕구는 선택으로 제거되지 않는다","body":"D2(행복)의 구성 요소는 다른 사람과 진짜로 연결되는 것을 포함한다. D24(기쁨)는 옥시토신·세로토닌 회로, 즉 안전한 관계와 연결에서 분비된다. 이것은 신경학적 구조이지 선택 사항이 아니다.\n\nO25에 의하면 비혼을 선택한 사람도 연결에 대한 목마름은 유지된다. SNS, 가벼운 만남, 반려동물, 취미 공동체로 채우려 하지만 이것들은 D23(쾌락)과 같은 소진 구조이다. 자극이 소진되면 목마름은 다시 돌아온다.\n\n→ 비혼은 연결 욕구를 제거하지 못한다. 욕구는 유지되고 대체물로 채워진다."},{"title":"역방향 2: 연결 이익은 원하되 희생 비용은 거부한다","body":"A2에 의하면 모든 이익에는 비용이 따른다. 깊은 관계라는 이익의 비용은 희생이다(L25). O16에 의하면 현대인은 이 희생을 피하려 하는 경향이 있다.\n\n비혼은 이것의 완성형이다. 희생을 절반만 피하는 것이 아니라 희생이 요구되는 구조 자체에 들어가지 않는 것이다. 그런데 O25에 의하면 연결 욕구는 사라지지 않으므로, 이익은 원하되 비용은 거부하는 상태가 유지된다. A2를 정면으로 위반한다.\n\n→ 비혼은 연결의 이익을 원하면서 희생의 비용을 거부하는 A2 위반이다."},{"title":"역방향 3: 두려움이 \"혼자가 편하다\"로 재해석된다","body":"A4에 의하면 두려움의 뿌리는 불확실성이다. 결합은 상대가 나를 상처 입힐 수 있다는 불확실성, 내가 희생해도 돌려받지 못할 수 있다는 불확실성을 포함한다. 이 불확실성이 두렵다.\n\n그런데 L4(감정은 사실이 아니라 해석이다)에 의하면 두려움은 직접 인식되지 않고 해석으로 변환된다. \"결합이 두렵다\"는 해석이 \"나는 원래 혼자가 편하다\"로 재포장된다. O22에 의하면 반복적 처벌 환경에서는 감정 신호 자체가 차단되므로 이 재해석이 더 깊게 작동한다. D12(강한 자아)는 이 재해석을 확신처럼 굳힌다.\n\n→ \"혼자가 편하다\"는 말은 두려움이 해석으로 변환된 결과일 가능성이 높다."},{"title":"역방향 4: T22과 같은 구조이다","body":"T22(회피형)은 소통 비용이 누적되어 대화를 피하는 구조이다. 비혼은 그것의 최대 스케일 버전이다.\n\n대화 회피 → 관계 회피 → 결합 회피\n\n구조는 같고 규모만 다르다. 소진의 임계점이 어디에 있느냐에 따라 어느 단계에서 멈추는지가 결정된다. D3(여유)가 더 많이 고갈될수록 더 넓은 범위를 차단한다. 비혼은 가장 넓은 범위를 차단한 것이다.\n\n→ 비혼은 T22의 극단이다. 해소 경로도 T22과 같다."},{"title":"결론","body":"비혼이 두려움과 소진에서 비롯됐다면 그 구조는 세 가지로 요약된다. 첫째, 연결 욕구는 유지되지만 대체물로 채운다(O25, D23). 둘째, 이익은 원하되 비용은 거부한다(A2, L25). 셋째, 두려움이 \"혼자가 편하다\"로 재해석된다(L4, D12, O22).\n\n이것은 D1(성숙)의 미완성이다. D1은 손해를 감수하는 책임을 받아들이는 것이다. 비혼이 이 구조에서 온 것이라면 손해 감수 자체를 구조 밖으로 내보낸 것이다.\n\n해소 경로는 T22과 같다. D7(납득) — 결합이 왜 필요한지, 희생이 왜 비용이 아니라 구조인지를 이해하는 것. D3(여유 회복) — 희생을 감수할 수 있는 여유를 회복하는 것.\n\n비혼은 결혼을 거부하는 것이 아니라 희생을 거부하는 것이다. □"}];

var HOWTO=[
  {num:"01",title:"Definitions부터 읽는다",desc:"이 시스템의 핵심 개념들은 일상적 의미와 다르게 정의된다. D2(행복), D3(여유), D5(사랑), D19(도파민 중독)의 정의를 먼저 확인하면 이후 논증이 훨씬 명확해진다."},

  {num:"03",title:"Proof 1이 전체 지도이다",desc:"행복한 결혼 → 역할 전환 → 선택 → 목적 자각 → 성숙 → 여유 → 인생의 원리 순으로 역방향 추적한다. 시스템 전체 구조를 한 번에 파악할 수 있다."},
  {num:"04",title:"P1b는 선택적 전제이다",desc:"P1b(목적은 절대자가 설계했다)는 신앙적 공준이다. 받아들이지 않아도 개인론·성숙론·관계론·결혼론의 대부분이 독립적으로 작동한다."},
  {num:"05",title:"Scholia가 반론과 한계를 다룬다",desc:"Scholia는 각 명제의 적용 한계, 반대 입장, 오용 가능성을 다룬다. O3·O4의 적용 범위(S1), 고통 명제의 한계(S6), SCD 예외(S7) 등을 확인한다."},
  {num:"06",title:"논리 흐름은 번호 순서를 따른다",desc:"A(공리) → P(공준) → D(정의) → L(보조정리) → T(정리) → C(따름정리)의 순서가 논리적 의존 관계이다. 번호가 낮을수록 더 기본적인 전제이다."},
];

// 전체 참조 맵
var REF_MAP={};
['A','P','D','O','L','T','C','S'].forEach(function(k){
  (DATA[k]||[]).forEach(function(item){REF_MAP[item.id]=item;});
});

// 상태
var state={
  view:'intro', // intro|main|proof
  section:'A',
  cardIdx:0,
  filter:null,
  popupStack:[],
  proofStep:0,
  proofNum:1,
  introTab:'layers',
};

function setState(patch){
  Object.assign(state,patch);
  render();
}

function getSec(){return SECTIONS.find(function(s){return s.key===state.section;})||SECTIONS[0];}
function getCards(){
  var all=DATA[state.section]||[];
  return state.filter?all.filter(function(c){return c.section===state.filter;}):all;
}

// HTML 헬퍼
function h(tag,attrs,children){
  var el=document.createElement(tag);
  if(attrs) Object.keys(attrs).forEach(function(k){
    if(k==='style'&&typeof attrs[k]==='object'){
      Object.assign(el.style,attrs[k]);
    } else if(k.startsWith('on')){
      el.addEventListener(k.slice(2).toLowerCase(),attrs[k]);
    } else if(k==='className'){
      el.className=attrs[k];
    } else {
      el.setAttribute(k,attrs[k]);
    }
  });
  if(children) [].concat(children).forEach(function(c){
    if(c==null) return;
    el.appendChild(typeof c==='string'?document.createTextNode(c):c);
  });
  return el;
}

function div(cls,children,extra){
  var el=document.createElement('div');
  if(cls) el.className=cls;
  if(extra) Object.keys(extra).forEach(function(k){
    if(k==='style') Object.assign(el.style,extra[k]);
    else if(k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(),extra[k]);
  });
  if(children)[].concat(children).forEach(function(c){
    if(c==null)return;
    el.appendChild(typeof c==='string'?document.createTextNode(c):c);
  });
  return el;
}

function btn(cls,text,onClick,extra){
  var el=h('button',Object.assign({className:cls,onClick:onClick},extra||{}),[text]);
  return el;
}

// 참조 번호를 클릭 가능한 span으로 변환
function linkify(text, accent){
  var parts=text.split(/(?<![A-Za-z])([ADLTCOP][0-9]+[ab]?)(?![A-Za-z0-9])/);
  var frag=document.createDocumentFragment();
  parts.forEach(function(p,i){
    if(REF_MAP[p]){
      var sp=document.createElement('span');
      sp.className='ref';
      sp.style.setProperty('--accent', accent||'#888');
      sp.textContent=p;
      sp.onclick=function(e){e.stopPropagation();state.popupStack.push(REF_MAP[p]);render();};
      frag.appendChild(sp);
    } else {
      frag.appendChild(document.createTextNode(p));
    }
  });
  return frag;
}

function makePopup(accent){
  if(!state.popupStack.length) return null;
  var item=state.popupStack[state.popupStack.length-1];
  var depth=state.popupStack.length;

  var overlay=div('overlay',null,{onClick:function(){state.popupStack=[];render();}});
  var popup=div('popup');
  popup.style.setProperty('--accent',accent||'#888');
  popup.onclick=function(e){e.stopPropagation();};

  // header
  var ph=div('popup-header');
  var pid=div(null);
  var pidSpan=h('span',{className:'popup-id',style:{color:accent||'#888'}},[item.id]);
  pid.appendChild(pidSpan);
  if(item.section){var ps=h('span',{className:'popup-section'},[item.section]);pid.appendChild(ps);}
  ph.appendChild(pid);
  var pbtns=div('popup-btns');
  if(depth>1){
    var backBtn=btn('popup-back','← 뒤로',function(){state.popupStack.pop();render();});
    pbtns.appendChild(backBtn);
  }
  var closeBtn=btn('popup-close','×',function(){state.popupStack=[];render();});
  pbtns.appendChild(closeBtn);
  ph.appendChild(pbtns);
  popup.appendChild(ph);

  // title
  var pt=h('div',{className:'popup-title'},[item.title]);
  popup.appendChild(pt);

  // divider
  var pd=div('popup-divider');
  pd.style.background=accent+'55';
  popup.appendChild(pd);

  // body with linkify
  var pb=div('popup-body');
  pb.appendChild(linkify(item.body, accent));
  popup.appendChild(pb);

  return [overlay, popup];
}

// HEADER
function makeHeader(){
  var hd=div('header');
  hd.innerHTML='<div class="header-sub">DE NATURA HOMINIS ET FELICITATIS</div><h1 class="header-title">인간 본성과 행복, 그리고 결합에 관하여</h1>';
  return hd;
}

// NAV
function makeNav(){
  var nav=div('nav');
  var sec=getSec();
  SECTIONS.forEach(function(s){
    var b=btn('nav-btn'+(state.view==='main'&&state.section===s.key?' active':''),
      s.emoji+' '+s.label,
      function(){setState({view:'main',section:s.key,cardIdx:0,filter:null});});
    b.style.setProperty('--accent',s.accent);
    nav.appendChild(b);
  });
  var proofBtn=btn('nav-btn'+(state.view==='proof'?' active':''),
    '🔍 Proof',function(){setState({view:'proof',proofStep:0});});
  proofBtn.style.setProperty('--accent','#f5a623');
  nav.appendChild(proofBtn);
  var introBtn=btn('nav-btn'+(state.view==='intro'?' active':''),
    '📖 Intro',function(){setState({view:'intro',introTab:'layers'});});
  introBtn.style.setProperty('--accent','#74b9ff');
  nav.appendChild(introBtn);
  return nav;
}

// INTRO VIEW

  var app=document.getElementById('app');
  app.innerHTML='';
  var frag=document.createDocumentFragment();

  frag.appendChild(makeNav());

  var wrap=div('intro-wrap');

  // top card

  ic.innerHTML='<div style="font-size:10px;letter-spacing:.2em;color:#444;margin-bottom:10px">INTRODUCTION</div>'
    +'<h2 style="font-size:20px;font-weight:normal;color:#e0d8d0;line-height:1.5;margin-bottom:14px">이 문서를 읽는 방법</h2>'
    +'<div style="width:30px;height:1px;background:#333;margin-bottom:14px"></div>'
    +'<p style="font-size:13px;line-height:1.9;color:#585048">이 문서는 스피노자의 기하학적 방법을 모델로 삼아 인간 본성, 행복, 결합에 관한 명제들을 공리에서 따름정리까지 논리적으로 전개한다. 각 명제는 선행하는 명제들에 의해 도출되며, 인용 번호를 통해 근거를 추적할 수 있다.</p>';
  wrap.appendChild(ic);

  // tabs
  var tabs=div('intro-tabs');
  var t1=btn('intro-tab'+(state.introTab==='layers'?' layers':''),'📐 계층 구조',function(){setState({introTab:'layers'});});
  var t2=btn('intro-tab'+(state.introTab==='howto'?' howto':''),'🔍 읽기 방법',function(){setState({introTab:'howto'});});
  tabs.appendChild(t1);tabs.appendChild(t2);
  wrap.appendChild(tabs);

  if(state.introTab==='layers'){
    var flowColors=['#e94560','#0f9fcf','#60c3bc','#f0a500','#4a69bd','#e17055','#a29bfe','#f5a623','#74b9ff'];
    var flowNames=['A','P','D','O','L','T','C','Proof','Scholia'];

    LAYERS.forEach(function(layer){
      var li=div('layer-item');
      var iconWrap=div(null);
      var icon=div('layer-icon');
      icon.style.background='color-mix(in srgb,'+layer.color+' 10%,transparent)';
      icon.style.border='1px solid color-mix(in srgb,'+layer.color+' 20%,transparent)';
      icon.style.color=layer.color;
      icon.textContent=layer.id.substring(0,3).toUpperCase();
      iconWrap.appendChild(icon);
      var cnt=div('layer-count');cnt.textContent=layer.count+'개';
      iconWrap.appendChild(cnt);
      li.appendChild(iconWrap);
      var info=div(null);
      var nm=div(null);
      nm.innerHTML='<span class="layer-name">'+layer.id+'</span><span class="layer-ko">'+layer.ko+'</span>';
      info.appendChild(nm);
      var dc=div('layer-desc');dc.textContent=layer.desc;
      info.appendChild(dc);
      li.appendChild(info);
      wrap.appendChild(li);
    });

    var fb=div('flow-box');
    var fl=div('flow-label');fl.textContent='논리적 의존 순서';fb.appendChild(fl);
    var fi=div('flow-items');
    flowNames.forEach(function(name,i){
      var it=div('flow-item');
      it.style.background='color-mix(in srgb,'+flowColors[i]+' 10%,transparent)';
      it.style.border='1px solid color-mix(in srgb,'+flowColors[i]+' 20%,transparent)';
      it.style.color=flowColors[i];
      it.textContent=name;
      fi.appendChild(it);
      if(i<flowNames.length-1){var ar=div('flow-arrow');ar.textContent='→';fi.appendChild(ar);}
    });
    fb.appendChild(fi);wrap.appendChild(fb);
  } else {
    HOWTO.forEach(function(item){
      var hi=div('howto-item');
      var num=div('howto-num');num.textContent=item.num;hi.appendChild(num);
      var info=div(null);
      var ht=div('howto-title');ht.textContent=item.title;info.appendChild(ht);
      var hd=div('howto-desc');hd.textContent=item.desc;info.appendChild(hd);
      hi.appendChild(info);
      wrap.appendChild(hi);
    });
  }

  var sb=btn('start-btn','읽기 시작 →',function(){setState({view:'main',section:'A',cardIdx:0});});
  wrap.appendChild(sb);
  frag.appendChild(wrap);
  app.appendChild(frag);
}

// PROOF VIEW
function renderProof(){
  var app=document.getElementById('app');
  app.innerHTML='';
  var frag=document.createDocumentFragment();
  frag.appendChild(makeHeader());
  frag.appendChild(makeNav());

  var wrap=div('proof-wrap');
  var pc=div('proof-card');

  // Proof 선택 탭
  var proofTabWrap=div(null);
  proofTabWrap.style.cssText='display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;';
  var p1btn=document.createElement('button');
  p1btn.className='proof-tab'+(state.proofNum===2?'':' active');
  p1btn.textContent='Proof 1';
  p1btn.onclick=function(){setState({proofNum:1,proofStep:0});};
  var p2btn=document.createElement('button');
  p2btn.className='proof-tab'+(state.proofNum===2?' active':'');
  p2btn.textContent='Proof 2';
  p2btn.onclick=function(){setState({proofNum:2,proofStep:0});};
  var p3btn=document.createElement('button');
  p3btn.className='proof-tab'+(state.proofNum===3?' active':'');
  p3btn.textContent='Proof 3';
  p3btn.onclick=function(){setState({proofNum:3,proofStep:0});};
  var p4btn=document.createElement('button');
  p4btn.className='proof-tab'+(state.proofNum===4?' active':'');
  p4btn.textContent='Proof 4';
  p4btn.onclick=function(){setState({proofNum:4,proofStep:0});};
  var p5btn=document.createElement('button');
  p5btn.className='proof-tab'+(state.proofNum===5?' active':'');
  p5btn.textContent='Proof 5';
  p5btn.onclick=function(){setState({proofNum:5,proofStep:0});};
  var p6btn=document.createElement('button');
  p6btn.className='proof-tab'+(state.proofNum===6?' active':'');
  p6btn.textContent='Proof 6';
  p6btn.onclick=function(){setState({proofNum:6,proofStep:0});};
  var p7btn=document.createElement('button');
  p7btn.className='proof-tab'+(state.proofNum===7?' active':'');
  p7btn.textContent='Proof 7';
  p7btn.onclick=function(){setState({proofNum:7,proofStep:0});};
  proofTabWrap.appendChild(p1btn);
  proofTabWrap.appendChild(p2btn);
  proofTabWrap.appendChild(p3btn);
  proofTabWrap.appendChild(p4btn);
  proofTabWrap.appendChild(p5btn);
  proofTabWrap.appendChild(p6btn);
  proofTabWrap.appendChild(p7btn);
  var p8btn=document.createElement('button');
  p8btn.className='proof-tab'+(state.proofNum===8?' active':'');
  p8btn.textContent='Proof 8';
  p8btn.onclick=function(){setState({proofNum:8,proofStep:0});};
  proofTabWrap.appendChild(p8btn);
  pc.appendChild(proofTabWrap);
  var currentProof=state.proofNum===8?PROOF8:state.proofNum===7?PROOF7:state.proofNum===6?PROOF6:state.proofNum===5?PROOF5:state.proofNum===4?PROOF4:state.proofNum===3?PROOF3:state.proofNum===2?PROOF2:PROOF;
  var pl=div('proof-label');
  pl.textContent='PROOF '+(state.proofNum||1);
  pc.appendChild(pl);
  var ps=div('proof-subtitle');
  var proofTitles={1:'인생의 원리를 알아야 행복한 결혼 생활을 할 수 있다',2:'처음 만나는 사람에게 무례하지 않으려면 무엇이 필요한가',3:'지는 것이 결국 이기는 것이다',4:'나보다 나은 사람을 만나려면 무엇이 필요한가',5:'결혼의 시퀀스는 왜 이 순서여야 하는가',6:'고유한 목적은 왜 성취 밖에 있는가',7:'회피형은 왜 생기고 어떻게 해소되는가',8:'비혼은 왜 극단적 회피인가'}; ps.textContent=proofTitles[state.proofNum]||'PROOF';
  pc.appendChild(ps);

  // step tabs
  var ptabs=div('proof-tabs');
  currentProof.forEach(function(s,i){
    var short=s.title.length>12?s.title.substring(0,12)+'…':s.title;
    var tb=btn('proof-tab'+(state.proofStep===i?' active':''),short,function(){setState({proofStep:i});});
    ptabs.appendChild(tb);
  });
  pc.appendChild(ptabs);

  var step=currentProof[state.proofStep];
  if(step){
    var sl=div('proof-step-label');sl.textContent=step.title;pc.appendChild(sl);
    var sb2=div('proof-step-body');
    sb2.appendChild(linkify(step.body,'#f5a623'));
    pc.appendChild(sb2);
  }
  wrap.appendChild(pc);

  // prev/next
  var pn=div('proof-nav');
  var prevBtn=btn('proof-nav-btn','← 이전',function(){setState({proofStep:Math.max(0,state.proofStep-1)});});
  prevBtn.disabled=state.proofStep===0;
  var dots2=div('proof-dots');
  PROOF.forEach(function(_,i){
    var d=div('dot'+(state.proofStep===i?' active':''));
    d.style.width=state.proofStep===i?'14px':'5px';
    d.style.background=state.proofStep===i?'#f5a623':'#222';
    d.onclick=function(){setState({proofStep:i});};
    dots2.appendChild(d);
  });
  var nextBtn=btn('proof-nav-btn','다음 →',function(){setState({proofStep:Math.min(currentProof.length-1,state.proofStep+1)});});
  nextBtn.disabled=state.proofStep===currentProof.length-1;
  pn.appendChild(prevBtn);pn.appendChild(dots2);pn.appendChild(nextBtn);
  wrap.appendChild(pn);
  frag.appendChild(wrap);

  // popups
  var popups=makePopup('#f5a623');
  if(popups){popups.forEach(function(p){frag.appendChild(p);});}

  app.appendChild(frag);
}

// MAIN VIEW
function renderMain(){
  var app=document.getElementById('app');
  app.innerHTML='';
  var frag=document.createDocumentFragment();

  var sec=getSec();
  var cards=getCards();
  var idx=Math.min(state.cardIdx,Math.max(0,cards.length-1));
  var card=cards[idx];
  var subs=[];
  (DATA[state.section]||[]).forEach(function(c){if(c.section&&subs.indexOf(c.section)<0)subs.push(c.section);});

  // CSS var
  document.documentElement.style.setProperty('--accent',sec.accent);

  frag.appendChild(makeHeader());
  frag.appendChild(makeNav());

  // filters
  if(subs.length){
    var filters=div('filters');
    subs.forEach(function(sf){
      var fb=btn('filter-btn'+(state.filter===sf?' active':''),sf,function(){
        setState({filter:state.filter===sf?null:sf,cardIdx:0});
      });
      fb.style.setProperty('--accent',sec.accent);
      filters.appendChild(fb);
    });
    frag.appendChild(filters);
  }

  frag.appendChild(h('div',{className:'count'},[cards.length+'개'+(state.filter?' · '+state.filter:'')]));

  if(!card){app.appendChild(frag);return;}

  // card
  var cardEl=div('card');
  cardEl.style.setProperty('--accent',sec.accent);
  cardEl.style.setProperty('--bg',sec.bg);

  var badge=div('card-badge');
  badge.appendChild(h('span',{className:'card-badge-id'},[card.id]));
  badge.appendChild(h('span',{className:'card-badge-sep'},['·']));
  badge.appendChild(h('span',{className:'card-badge-label'},[sec.label+(card.section?' / '+card.section:'')]));
  cardEl.appendChild(badge);

  var title=h('h2',{className:'card-title'},[card.title]);
  cardEl.appendChild(title);
  cardEl.appendChild(div('card-divider'));

  var body=div('card-body');
  body.appendChild(linkify(card.body, sec.accent));
  cardEl.appendChild(body);

  var counter=div('card-counter');
  counter.textContent=(idx+1)+' / '+cards.length;
  cardEl.appendChild(counter);
  frag.appendChild(cardEl);

  // arrows + dots
  var arrowWrap=div('nav-arrows');
  var prevA=btn('arrow-btn','‹',function(){
    if(state.cardIdx<=0) setState({cardIdx:cards.length-1});
    else setState({cardIdx:state.cardIdx-1});
  });
  arrowWrap.appendChild(prevA);

  var dots=div('dots');
  var shown=Math.min(cards.length,40);
  for(var i=0;i<shown;i++){
    (function(i){
      var d=div('dot'+(idx===i?' active':''));
      d.style.width=idx===i?'14px':'4px';
      d.onclick=function(){setState({cardIdx:i});};
      dots.appendChild(d);
    })(i);
  }
  arrowWrap.appendChild(dots);

  var nextA=btn('arrow-btn','›',function(){
    if(state.cardIdx>=cards.length-1) setState({cardIdx:0});
    else setState({cardIdx:state.cardIdx+1});
  });
  arrowWrap.appendChild(nextA);
  frag.appendChild(arrowWrap);

  // grid
  var grid=div('grid');
  cards.forEach(function(c,i){
    var gi=div('grid-item'+(idx===i?' active':''));
    gi.style.setProperty('--accent',sec.accent);
    gi.appendChild(h('div',{className:'grid-item-id'},[c.id]));
    gi.appendChild(h('div',{className:'grid-item-title'},[c.title]));
    gi.onclick=function(){setState({cardIdx:i});};
    grid.appendChild(gi);
  });
  frag.appendChild(grid);

  frag.appendChild(h('div',{className:'footer'},['A → P → D → O → L → T → C → Proofs → Scholia']));

  // popups
  var popups=makePopup(sec.accent);
  if(popups){popups.forEach(function(p){frag.appendChild(p);});}

  app.appendChild(frag);
}

function render(){
  if(state.view==='intro') renderIntro();
  else if(state.view==='proof') renderProof();
  else renderMain();
}

render();
</script>
