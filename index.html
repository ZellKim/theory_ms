<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>De Natura Hominis et Felicitatis</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d0d;color:#e0d8d0;font-family:Georgia,serif;min-height:100vh}
button{cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:#0d0d0d}
::-webkit-scrollbar-thumb{background:#252525;border-radius:2px}
#app{display:flex;flex-direction:column;align-items:center;padding:24px 16px;min-height:100vh}
.header{text-align:center;margin-bottom:20px;max-width:640px;width:100%}
.header-sub{font-size:10px;letter-spacing:.28em;color:#383838;margin-bottom:5px}
.header-title{font-size:19px;font-weight:normal;color:#d8d0c8;letter-spacing:.02em}
.nav{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap;justify-content:center;max-width:640px;width:100%}
.nav-btn{padding:5px 12px;border-radius:20px;font-size:11px;border:1px solid #252525;background:transparent;color:#555;transition:all .2s}
.nav-btn.active{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 13%,transparent);color:var(--accent)}
.filters{display:flex;gap:5px;margin-bottom:8px;flex-wrap:wrap;justify-content:center;max-width:640px;width:100%}
.filter-btn{padding:3px 9px;border-radius:10px;font-size:10px;border:1px solid #1e1e1e;background:#0a0a0a;color:#4a4a4a;transition:all .2s}
.filter-btn.active{border-color:color-mix(in srgb,var(--accent) 50%,transparent);background:color-mix(in srgb,var(--accent) 10%,transparent);color:var(--accent)}
.count{font-size:10px;color:#2a2a2a;margin-bottom:8px;letter-spacing:.08em}
.card{width:100%;max-width:590px;border-radius:18px;padding:28px 32px;position:relative;border:1px solid color-mix(in srgb,var(--accent) 16%,transparent);background:linear-gradient(150deg,var(--bg) 0%,#0d0d0d 100%);box-shadow:0 0 60px color-mix(in srgb,var(--accent) 5%,transparent);transition:opacity .14s,transform .14s}
.card.anim{opacity:0;transform:translateY(5px)}
.card-badge{display:inline-flex;align-items:center;gap:6px;border-radius:6px;padding:4px 10px;margin-bottom:16px;background:color-mix(in srgb,var(--accent) 10%,transparent);border:1px solid color-mix(in srgb,var(--accent) 27%,transparent)}
.card-badge-id{font-size:10px;color:var(--accent);letter-spacing:.15em;font-family:monospace}
.card-badge-sep{font-size:10px;color:#2a2a2a}
.card-badge-label{font-size:10px;color:#555}
.card-title{font-size:18px;font-weight:normal;line-height:1.55;margin-bottom:14px;color:#ede5dc}
.card-divider{width:30px;height:1px;background:color-mix(in srgb,var(--accent) 33%,transparent);margin-bottom:14px}
.card-body{font-size:14px;line-height:1.9;color:#7a7268;padding-bottom:28px;white-space:pre-wrap}
.card-body .ref{color:var(--accent);border-bottom:1px dotted color-mix(in srgb,var(--accent) 40%,transparent);cursor:pointer;font-family:monospace;font-size:.9em;padding:0 1px}
.card-counter{position:absolute;bottom:16px;right:20px;font-size:10px;color:#2e2e2e}
.nav-arrows{display:flex;align-items:center;gap:12px;margin-top:14px}
.arrow-btn{width:38px;height:38px;border-radius:50%;border:1px solid #222;background:#0f0f0f;color:#666;font-size:16px;display:flex;align-items:center;justify-content:center}
.dots{display:flex;gap:4px;max-width:240px;overflow:hidden}
.dot{height:4px;border-radius:2px;border:none;padding:0;background:#222;transition:all .2s;flex-shrink:0}
.dot.active{background:var(--accent)}
.grid{margin-top:16px;max-width:590px;width:100%;display:grid;grid-template-columns:repeat(auto-fill,minmax(86px,1fr));gap:4px;max-height:230px;overflow-y:auto}
.grid-item{padding:6px 8px;background:#0a0a0a;border:1px solid #161616;border-radius:6px;text-align:left;cursor:pointer;transition:all .15s}
.grid-item.active{background:color-mix(in srgb,var(--accent) 10%,transparent);border-color:color-mix(in srgb,var(--accent) 27%,transparent)}
.grid-item-id{font-size:8px;color:var(--accent);margin-bottom:2px;font-family:monospace}
.grid-item-title{font-size:10px;line-height:1.35;color:#3e3e3e;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.grid-item.active .grid-item-title{color:#d8d0c8}
.footer{margin-top:20px;font-size:9px;color:#222;letter-spacing:.12em}
/* Popup */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:999;backdrop-filter:blur(2px)}
.popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:min(92vw,480px);background:#161616;border-radius:14px;padding:24px 26px;z-index:1000;box-shadow:0 8px 60px rgba(0,0,0,.8);max-height:80vh;overflow-y:auto}
.popup-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.popup-id{font-size:10px;font-family:monospace;letter-spacing:.15em}
.popup-section{font-size:10px;color:#444;margin-left:8px}
.popup-btns{display:flex;gap:6px;align-items:center}
.popup-back{background:none;border:1px solid #333;border-radius:6px;color:#777;font-size:11px;padding:3px 8px}
.popup-close{background:none;border:none;color:#555;font-size:20px;line-height:1;padding:0 0 0 4px}
.popup-title{font-size:16px;font-weight:normal;color:#e0d8d0;line-height:1.5;margin-bottom:14px}
.popup-divider{width:28px;height:1px;margin-bottom:14px}
.popup-body{font-size:13px;line-height:1.85;color:#706860;white-space:pre-wrap}
.popup-body .ref{color:var(--accent);border-bottom:1px dotted color-mix(in srgb,var(--accent) 40%,transparent);cursor:pointer;font-family:monospace;font-size:.9em;padding:0 1px}
/* Proof */
.proof-wrap{width:100%;max-width:600px}
.proof-card{background:#0f0f0f;border:1px solid #f5a62330;border-radius:16px;padding:28px 30px;margin-bottom:16px}
.proof-label{font-size:10px;letter-spacing:.2em;color:#f5a623;margin-bottom:8px}
.proof-subtitle{font-size:17px;font-weight:normal;color:#e0d8d0;line-height:1.6;margin-bottom:24px}
.proof-tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:20px}
.proof-tab{padding:4px 10px;border-radius:10px;font-size:10px;border:1px solid #252525;background:transparent;color:#555}
.proof-tab.active{border-color:#f5a623;background:color-mix(in srgb,#f5a623 12%,transparent);color:#f5a623}
.proof-step-label{font-size:10px;color:#666;letter-spacing:.1em;margin-bottom:2px}
.proof-step-body{font-size:14px;line-height:1.85;color:#8a8078;white-space:pre-wrap}
.proof-step-body .ref{color:#f5a623;border-bottom:1px dotted rgba(245,166,35,.4);cursor:pointer;font-family:monospace;font-size:.9em;padding:0 1px}
.proof-nav{display:flex;justify-content:space-between;gap:8px}
.proof-nav-btn{flex:1;padding:10px;border-radius:10px;border:1px solid #252525;background:#111;color:#888;font-size:13px}
.proof-nav-btn:disabled{color:#333;background:#0a0a0a}
.proof-dots{display:flex;align-items:center;gap:5px}
/* Intro */
.intro-wrap{width:100%;max-width:620px;padding-bottom:40px}
.intro-card{background:#0f0f0f;border:1px solid #2a2a2a;border-radius:16px;padding:28px 30px;margin-bottom:16px}
.intro-tabs{display:flex;gap:6px;margin-bottom:14px}
.intro-tab{flex:1;padding:9px;border-radius:10px;border:1px solid #1e1e1e;background:#0a0a0a;color:#555;font-size:12px}
.intro-tab.layers{border-color:#4a69bd;background:color-mix(in srgb,#4a69bd 12%,transparent);color:#4a69bd}
.intro-tab.howto{border-color:#e17055;background:color-mix(in srgb,#e17055 12%,transparent);color:#e17055}
.layer-item{background:#0a0a0a;border:1px solid #161616;border-radius:10px;padding:14px 16px;display:flex;gap:14px;align-items:flex-start;margin-bottom:6px}
.layer-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:10px;font-family:monospace;flex-shrink:0}
.layer-count{font-size:9px;color:#333;text-align:center;margin-top:4px}
.layer-name{font-size:13px;color:#d0c8c0;margin-bottom:5px}
.layer-ko{font-size:11px;color:#444;margin-left:8px}
.layer-desc{font-size:12px;line-height:1.7;color:#585048}
.flow-box{margin:8px 0;padding:14px 16px;background:#0a0a0a;border:1px solid #161616;border-radius:10px;text-align:center}
.flow-label{font-size:11px;color:#444;letter-spacing:.08em;margin-bottom:8px}
.flow-items{display:flex;flex-wrap:wrap;justify-content:center;gap:4px;align-items:center}
.flow-item{padding:4px 8px;border-radius:6px;font-size:11px}
.flow-arrow{font-size:12px;color:#2a2a2a}
.howto-item{background:#0a0a0a;border:1px solid #161616;border-radius:10px;padding:16px 18px;display:flex;gap:14px;margin-bottom:6px}
.howto-num{width:28px;height:28px;border-radius:6px;background:color-mix(in srgb,#e17055 10%,transparent);border:1px solid color-mix(in srgb,#e17055 20%,transparent);display:flex;align-items:center;justify-content:center;font-size:10px;color:#e17055;font-family:monospace;flex-shrink:0;margin-top:2px}
.howto-title{font-size:13px;color:#d0c8c0;margin-bottom:6px}
.howto-desc{font-size:12px;line-height:1.75;color:#585048}
.start-btn{width:100%;margin-top:14px;padding:14px;border-radius:12px;border:1px solid #4a69bd55;background:#4a69bd18;color:#8ba3e8;font-size:14px;letter-spacing:.05em}
@media(max-width:480px){.header-title{font-size:16px}.card-title{font-size:16px}}
</style>
</head>
<body>
<div id="app"></div>
<script>
var DATA={"A": [{"id": "A1", "title": "세상은 순서대로 움직인다", "body": "모든 일에는 결과 뒤에 숨겨진 원인의 연쇄가 있다. 원하는 결과를 얻으려면 그 결과에 이르는 선행 조건들을 역방향으로 거슬러 올라가서 지금 무엇을 먼저 해야 하는지 알아야 한다. 순서를 건너뛰면 원하는 결과에 도달할 수 없다."}, {"id": "A2", "title": "모든 선택에는 이익과 비용이 함께 온다", "body": "세상의 모든 선택과 상태는 이익과 비용이 쌍을 이룬다. 이익이 클수록 비용도 크다. 어떤 장점이 극대화되면 반드시 다른 무언가는 줄어든다. 이것은 물리학부터 경제학까지, 자연과 사회 어디에서나 작동하는 불변의 법칙이다."}, {"id": "A3", "title": "인간의 시간과 적절한 때는 다르다", "body": "인간이 측정하고 통제하려는 순서적 시간(인간의 시간, Kronos)과, 인간의 계획과 상관없이 의미 있는 순간이 찾아오는 질적 시간(적절한 때, Kairos)은 다르다. 삶의 고통 중 상당 부분은 적절한 때를 인간의 속도로 앞당기려는 데서 비롯된다. 씨앗을 심고 싶다고 겨울에 심을 수 없듯, 때가 아닌 것을 억지로 끌어당기려 할 때 고통이 생긴다."}, {"id": "A4", "title": "두려움의 주된 뿌리는 불확실성이다", "body": "두려움은 주로 결과를 알 수 없는 상태에서 생긴다. 특히 적절한 때가 언제 올지 알 수 없을 때 두려움이 커지고, 이 두려움은 억지로 통제하거나 회피하려는 반응을 낳는다."}, {"id": "A5", "title": "세상에는 인간의 통제 밖에 있는 절대적 질서가 있다", "body": "세상에는 인간이 통제할 수 없는 더 큰 질서가 있다. 이 질서는 적절한 때에 따라 작동하며, 절대자는 인간보다 항상 크다. 인간이 아무리 해도 통제할 수 없다고 느끼는 것들은 이 질서 안에 있다."}, {"id": "A6", "title": "세상의 원리는 하나이다", "body": "사람마다 세계관이 다르고, 성장 환경이 다르고, 진리를 이해하는 방식이 다르다. 그러나 세상이 움직이는 원리 자체는 하나이다. 세계관의 다양성은 하나의 원리에 대한 다양한 이해 방식이지, 원리 자체가 여럿임을 의미하지 않는다."}], "P": [{"id": "P1a", "title": "모든 사람에게는 고유한 목적이 있다", "body": "모든 사람은 다른 누구와도 대체할 수 없는 고유한 존재이며, 그 고유함에 맞는 삶의 방향이 있다. 이 방향을 찾아가는 것이 허무를 넘어서는 삶의 조건이다. 종교가 없어도 받아들일 수 있는 전제이다."}, {"id": "P1b", "title": "그 목적은 절대자가 설계했다", "body": "모든 사람은 우연이 아닌 절대자의 섬세한 계획 아래 지어졌다. 그 계획은 인간이 정한 시간이 아닌 적절한 때에 드러난다. 절대자의 질서 안에 머무는 것이 풍성함이고, 벗어나는 것이 공허함이다. 이 전제는 P1a를 신앙적으로 완성한다."}], "D": [{"id": "D1", "title": "성숙", "body": "성숙이란 자신 안의 충동을 알아채면서도 그것에 끌려다니지 않고, 시간적·물질적·심리적 여유를 바탕으로 손해를 감수하는 책임을 스스로 받아들이는 상태이다. 한마디로, 불확실한 것을 억지로 통제하려 하지 않고 적절한 때를 믿으며 기다리는 능력이다."}, {"id": "D2", "title": "행복", "body": "행복이란 욕구를 다 채우는 것이 아니다. 책임을 받아들임으로써 불안에서 자유로워지고, 동시에 다른 사람과 진짜로 연결되고, 의미 있게 기여하고, 나만의 방향을 향해 나아가는 복합적인 상태이다. 불안이 없는 것만이 아니라, 의미가 있는 것까지 포함한다."}, {"id": "D3", "title": "여유", "body": "여유란 시간·돈·심리적 자원이 자신의 필요를 넘어서 존재하는 상태이다. 여유가 있어야 불확실성을 버티고, 적절한 때를 기다리며, 손해를 감수할 수 있다. 여유는 성숙(D1)의 물질적 기반이다."}, {"id": "D4", "title": "부모성", "body": "부모성이란 아무것도 돌려받기를 기대하지 않고 희생하는 것을 본질로 하는 역할 상태이다. 이것은 성숙(D1)의 완성형이며, 다른 사람을 내 이익 계산 밖에 두는 윤리적 전환을 포함한다."}, {"id": "D5", "title": "사랑", "body": "사랑은 도파민적 자극이 아니다. 다른 사람에 대한 지속적인 인내를 가능하게 하는 결속이다. 그 인내의 실제 내용은, 불확실함과 침묵을 견디고 두려움을 질문이나 공격으로 돌려서 표현하지 않으며, 상대가 스스로 열릴 적절한 때를 기다리는 것이다."}, {"id": "D6", "title": "원하는 것 vs 필요한 것", "body": "원하는 것은 자극과 쾌감에 기반한 선호이다. 필요한 것은 나의 부족함과 상대의 강점이 서로 맞물리는 구조적 적합성이다. 원하는 것으로 사람을 선택하면 소진되고, 필요한 것으로 선택하면 지속된다."}, {"id": "D7", "title": "납득", "body": "납득이란 규범이나 요구의 진짜 이유를 상대방이 스스로 받아들이는 상태이다. 납득 없는 복종은 외부 강제에 기대므로 강제가 사라지면 무너진다."}, {"id": "D8", "title": "상호보완적 파트너십", "body": "두 사람이 서로 다른 능력과 부족함을 가짐으로써, 각자 혼자서는 못 이루는 것을 함께 이루는 동업 구조이다. 파트너는 위아래가 없으므로 자기 방식을 강요할 권한이 없다. 상대의 방식이 나와 다른 것은 틀린 것이 아니다."}, {"id": "D9", "title": "시퀀스", "body": "시퀀스란 어떤 결과 R에 이르기 위해 반드시 거쳐야 하는 선행 단계들의 순서화된 집합이다. 임의로 단계를 건너뛰거나 순서를 바꾸면 R에 도달할 수 없다. 다만, 적절한 때의 개입은 시퀀스를 예상치 못한 방식으로 완성할 수 있다."}, {"id": "D10", "title": "감정", "body": "감정은 일어난 사실 그 자체가 아니라, 그 사실에 대한 나의 해석에서 생기는 반응이다. 따라서 같은 사실도 해석에 따라 전혀 다른 감정을 낳는다."}, {"id": "D11", "title": "완벽주의", "body": "결과에 대한 기대치가 실제로 가능한 수준을 구조적으로 초과하는 상태이다. 불확실한 결과에 대한 두려움을 사전에 차단하려는 자기방어 기제로 작동한다. 이 구조는 정해진 연쇄를 낳는다: 완벽할 수 없다는 인식 → 비판받을 두려움 → 망설임 → 행동 회피 → 자책 → 고립과 우울. 이 연쇄는 과거 성취와 무관하게 작동하며, 기대치와 현실 사이의 간격이 클수록 강화된다."}, {"id": "D12", "title": "강한 자아", "body": "모든 상황을 내가 통제할 수 있고 불확실성을 제거할 수 있다고 전제하는 심리적 상태이다. 겉으로는 강해 보이지만, 실제로는 불확실성에 대한 강한 두려움의 다른 표현이다."}, {"id": "D13", "title": "자아의 내려놓음", "body": "억지로 모든 것을 통제하려는 시도를 멈추고, 통제할 수 없는 것을 받아들이며 적절한 때를 기다리는 상태이다. 여유(D3)를 전제로 하며, 절대적 질서(A5)에 대한 신뢰를 기반으로 한다."}, {"id": "D14", "title": "인정욕구", "body": "다른 사람의 평가와 인정을 통해 자신의 가치를 확인하려는 욕구이다. 인정받지 못할 수 있다는 불확실성에 대한 두려움에서 비롯된다. 적당하면 성장 동력이 되지만, 지나치면 다음의 문제들이 연쇄적으로 나타난다: 다른 사람 평가에 끌려다니는 삶, 자존감 저하와 불안, 완벽주의 강박, 감정적으로 이용당하는 관계, 자기 자신을 잃어버림. 이 다섯 가지는 따로 생기는 것이 아니라 인정욕 과잉의 하나의 연쇄이다."}, {"id": "D15", "title": "타자", "body": "나의 이익 계산 밖에 독립적으로 존재하는 다른 사람이다. 타자의 고통과 필요는 내 행복 추구와 상관없이 그 자체로 중요성을 갖는다. 성숙한 사람은 타자를 수단이 아닌 목적으로 대한다."}, {"id": "D16", "title": "인생의 목적", "body": "인생의 목적이란 각 사람에게 고유한 삶의 방향을 발견하고 이루어가는 과정이다. P1a에 의해 이 방향은 내 욕구(D14)나 도파민적 성취가 아닌 외부적 기준에서 온다. P1b에 의해 그 기준은 절대자의 계획이다."}, {"id": "D17", "title": "공동체", "body": "공동체란 개인과 사회 사이에서 서로 돌보고 책임을 나누는 중간 구조이다. 공동체는 내 여유(D3)가 부족할 때 보완해주고, 고통의 경보를 함께 읽으며, 용서와 감사가 실제로 일어나는 구체적인 장소이다."}, {"id": "D18", "title": "평안", "body": "평안이란 불확실성이 사라진 상태가 아니라, 불확실성 속에서도 흔들리지 않는 내적 안정 상태이다. 두려움(A4)의 반대는 확실성이 아니라 신뢰이며, 평안은 신뢰가 내면에 자리 잡은 결과이다."}, {"id": "D19", "title": "도파민 중독", "body": "도파민의 과도한 분비 또는 과잉 반응으로 발생하는 중독 상태이다. 핵심은 특정 자극의 내용이 아니라, 도파민을 유발하는 것을 찾고 의지하는 구조 자체이다. 성취, 드라마, 음란물, SNS 반응은 내용이 전혀 다르지만 뇌에서 작동하는 방식은 구조적으로 동일하다. 자극이 클수록 다음에는 더 큰 자극을 요구하며, 자극이 없으면 공허함과 불안이 찾아온다. 이 상태에서 인간은 행복(D2)을 향해 나아가는 것이 아니라, 불쾌함을 피하기 위해 자극을 찾는 구조로 전환된다. D2(행복)가 책임과 연결과 의미를 향해 나아가는 능동적 상태라면, D19는 자극의 부재를 견디지 못해 자극으로 도망치는 수동적 상태이다."}, {"id": "D20", "title": "사랑의 언어", "body": "사람마다 사랑을 받아들이는 방식이 다르며, 크게 다섯 가지 유형으로 관찰된다: 긍정의 말, 봉사 행위, 선물, 함께하는 시간, 스킨십. 각 사람에게 가장 강하게 사랑으로 닿는 방식은 성장 환경과 기질에 따라 형성된다. 이것은 D5(사랑)의 실천 방식에 관한 정의이다. 사랑의 본질은 하나이지만, 그것이 상대에게 닿는 경로는 사람마다 다르다."}], "O": [{"id": "O1", "title": "도파민 자극은 종류와 상관없이 구조가 같다", "body": "도파민을 일으키는 자극은 그것이 성취든 드라마든 음란물이든 약물이든 타인의 인정이든, 뇌에서 작동하는 방식은 구조적으로 동일하다. 이것은 D19(도파민 중독)이 자극의 내용이 아닌 구조의 문제임을 뒷받침한다."}, {"id": "O2", "title": "불확실한 상황에서 뇌는 자동으로 최악을 상상한다", "body": "인간의 뇌는 불확실한 상황에서 자동으로 최악의 시나리오를 만들어낸다. 이것은 생존 본능에서 나온 기본 작동 방식이며, 의식적으로 개입하지 않으면 멈추지 않는다. A4(두려움의 뿌리는 불확실성)를 경험적으로 뒷받침한다."}, {"id": "O3", "title": "남성과 여성은 평균적으로 다른 충동을 갖는 경향이 있다", "body": "평균적으로 남성의 지배적 내적 충동은 성욕과 연관되는 경향이 있고, 여성의 지배적 충동은 불안과 연관되는 경향이 있다. 단, 개인 차이가 크고 문화와 사회적 맥락에 따라 다르게 나타난다."}, {"id": "O4", "title": "남성과 여성은 평균적으로 상대를 다른 기준으로 평가한다", "body": "평균적으로 남성은 이성을 볼 때 외모에 높은 비중을 두고, 여성은 자원과 안정성에 높은 비중을 두는 경향이 있다. 이 경향은 개인·문화·시대에 따라 상당히 다르며, 남성의 외모 비중은 나이가 들수록 줄어드는 경향이 있다."}, {"id": "O5", "title": "여성의 감정은 호르몬의 영향을 많이 받는다", "body": "여성의 감정 상태는 호르몬과 내분비계의 영향을 크게 받는다. 그래서 여성의 심리적 증상은 정신적 원인을 찾기 전에 먼저 생리적·호르몬적 원인을 확인해야 한다."}, {"id": "O6", "title": "사람마다 사랑을 받아들이는 방식이 다르다", "body": "D20에서 관찰된 것처럼, 사람마다 사랑을 주고받는 방식이 다르다. 긍정의 말, 봉사 행위, 선물, 함께하는 시간, 스킨십 중 어느 것이 자신에게 사랑으로 닿는지는 사람마다 다르며, 이것은 성장 환경과 기질에 따라 형성된다. 내가 자연스럽게 표현하는 방식과 상대가 받아들이는 방식이 다를 때, 두 사람은 서로 진심으로 사랑하면서도 사랑받지 못한다고 느낀다. 이것은 악의가 아니라 구조의 문제이다."}, {"id": "O7", "title": "비슷한 성장 환경은 비슷한 세계관을 형성한다", "body": "A6(세상의 원리는 하나)에 의해 세계관의 다양성은 환경의 차이에서 비롯된다. 대부분의 경우 비슷한 성장 환경에서 자란 사람들은 비슷한 세계관, 가치 기준, 감정 반응 방식을 갖게 된다. 이것은 관계에서 편안함의 기반이 되기도 하지만, 동시에 서로의 다름을 \"틀린 것\"으로 오해하는 원인이 되기도 한다. 성장하면서 공기처럼 흡수된 가정(assumption)들은 본인이 가정을 하고 있다는 사실조차 인식하지 못하는 경우가 많다."}, {"id": "O8", "title": "결혼을 사회적 계약으로 보는 태도가 관찰된다", "body": "결혼의 본질을 사회적 의무의 이행으로 보는 태도가 있다. 내적 동기가 아닌 외적 규범에 의해 맺어지는 결합이다. 불확실성을 외적 규범으로 제거하려는 시도이므로 내적 동기를 구조적으로 결여한다."}, {"id": "O9", "title": "역할 교환 비용의 비대칭이 관찰된다", "body": "성별 역할 체계에서 권리와 의무는 한 쌍이다. 한쪽 성별이 기존 역할의 권리만 가져가고 의무는 억압이라고 규정하면, 상대 성별은 양쪽 역할의 의무를 모두 떠안게 된다."}, {"id": "O10", "title": "두려움을 질문이나 공격으로 돌려 표현하는 패턴이 관찰된다", "body": "A4(두려움의 뿌리는 불확실성)에 의해, 불확실성 앞에서 두려움을 직접 표현하는 것 자체가 추가적 불확실성을 낳으므로 간접화가 일어난다. 자신의 두려움이나 불안을 직접 말하지 않고, 상대에 대한 질문이나 공격으로 돌려서 표현하는 방식이다. 불확실한 상황을 질문으로 빨리 해결하려는 조급함도 여기 포함된다. 말하는 사람의 의도와 듣는 사람의 해석 사이에 구조적 엇갈림이 생긴다."}, {"id": "O11", "title": "정서적 미성숙의 패턴이 관찰된다", "body": "D1(성숙)의 조건이 충족되지 않은 상태에서 나타나는 패턴이다. 정서적 미성숙이란 감정 조절과 관계 조율 능력이 자라지 못한 상태이다. 핵심 특징은 \"내가 느끼는 것 = 사실\"이라는 등식으로 작동하는 것이다. 여기서 상대가 나를 이해해야 한다는 요구, 불편함을 피하려는 공격이나 회피, 자기가 특별해야 한다는 집착이 파생된다."}, {"id": "O12", "title": "소진 구조가 관찰된다", "body": "D19(도파민 중독)의 구조적 특성이다. 어떤 만족이 유효기간을 갖고, 소진된 후에는 이전보다 더 큰 자극을 요구하는 자기강화적 순환이다. 성취로 얻는 만족이 그 전형이다. 만족이 사라진 후에는 성취 이전보다 더 큰 공허함이 찾아오며, 이를 채우려면 더 큰 성취가 필요하다. 인간의 욕심은 충족되어도 소멸하지 않고 더 큰 대상으로 이동하므로, 소진 구조를 동력으로 삼는 삶은 구조적으로 멈출 수가 없다."}, {"id": "O13", "title": "대화에는 관계 유지 모드와 정보 교환 모드가 있다", "body": "D7(납득)이 없으면 두 모드 사이의 전환이 일어나지 않는다. 언어학자 Deborah Tannen의 연구에서 관찰된 것처럼, 대화는 두 가지 다른 목적으로 사용된다. 관계 유지 모드(rapport talk)는 대화를 통해 연결과 지지를 주고받는 방식이고, 정보 교환 모드(report talk)는 사실 전달과 문제 해결을 목적으로 하는 방식이다. \"이 옷 어때?\"는 사실을 묻는 것이 아니라 연결과 지지를 요청하는 사회적 신호인 경우가 많다. 두 모드 모두 필요한 상황이 다를 뿐이며, 문제는 어느 쪽이 더 좋은가가 아니라 지금 어떤 모드가 필요한지 구분하지 못하는 것이다. 또한 이 차이는 성별의 본질적 특성이 아니라 사회화의 결과이며, 개인차가 집단 간 차이보다 크다."}, {"id": "O14", "title": "rapport talk가 지배적인 환경에서는 간접성이 기본값이 되어 불안이 구조화된다", "body": "여성 중심 집단처럼 관계 유지 모드(rapport talk)가 지배적인 환경에서는 직접적 표현이 오히려 이질적인 것으로 느껴진다. 서로의 진심이 간접적으로만 전달되므로 상대의 감정과 의도를 추측해야 하는 부담이 커지고, 이것이 만성적 불안을 낳는다. 또한 서로 기분을 상하게 하지 않으려는 조심스러움이 고착되면서 진짜 피드백이 사라지고 분위기를 유지하는 것이 목적이 된다. 이 패턴이 오래 지속될수록 직접적 소통 방식에 노출됐을 때 공격으로 받아들이거나 관계 단절로 해석하는 경향이 강해진다."}, {"id": "O15", "title": "결혼을 앞두면 무의식적으로 부모를 찾는다", "body": "D12(강한자아)가 아직 작동하는 상태에서 결혼이라는 불확실성에 노출될 때 나타나는 패턴이다. 결혼을 앞둔 사람은 자신 안의 지배 충동을 받아줄 원초적 대상을 상대에게서 찾는 경향이 있다. 자아를 내려놓기 전의 상태에서 상대는 엄마 또는 아빠의 역할을 대신할 존재로 투영된다.\n\n## Lemmas (보조정리)\n*공리와 정의로부터 도출되는 중간 명제들*"}], "L": [{"id": "L1", "title": "억지로 통제하려 할수록 두려움은 커진다", "body": "A3, A4에 의해, 적절한 때를 인간의 속도로 앞당기려는 시도는 불확실성을 없애지 못하고 오히려 통제가 안 된다는 사실을 반복해서 확인시킨다. 이것은 두려움을 줄이는 것이 아니라 오히려 키운다.", "section": "개인 심리"}, {"id": "L2", "title": "강한 자아는 역설적으로 가장 취약하다", "body": "A4, D12에 의해, 모든 것을 통제하려는 강한 자아는 불확실성에 대한 두려움이 그만큼 크다는 뜻이다. 두려움이 클수록 통제 욕구가 강해지고, 통제 욕구가 강할수록 통제가 안 되는 현실 앞에서 더 크게 무너진다.", "section": "개인 심리"}, {"id": "L3", "title": "무조건적인 자유 추구는 미성숙의 표시이다", "body": "D1에 의해, 모든 통제를 거부하고 무조건적인 자유를 원하는 태도는 충동을 책임으로 바꾸지 못한 상태이다. 사춘기식 자아실현 추구는 주체적으로 보이지만, 실제로는 불확실성에 대한 책임 회피에서 오는 불안 상태이다.", "section": "개인 심리"}, {"id": "L4", "title": "감정은 사실이 아니라 해석이다", "body": "D10에 의해, 감정을 사실과 같은 것으로 여기는 사람은 자기 해석을 현실로 믿기 때문에 소통이나 수정이 불가능해진다. 감정이 해석임을 아는 사람은 같은 사실에 대해 다르게 해석할 수 있다는 것을 안다.", "section": "개인 심리"}, {"id": "L5", "title": "완벽주의는 두려움에서 나온 자기보호이다", "body": "A4, D14에 의해, 완벽주의는 성취를 원해서가 아니라 불확실한 결과로 인한 상처와 손해를 미리 막으려는 자기방어에서 온다. 그래서 완벽주의를 없애려면 결과의 질을 높이는 것이 아니라, 불확실성에 대한 두려움을 직면하는 것부터 시작해야 한다.", "section": "개인 심리"}, {"id": "L6", "title": "자아실현이라고 불리는 것의 실제 동기는 대부분 인정욕과 도파민이다", "body": "D14, L3에 의해, 인정욕(D14)은 적당하면 성장 동력이지만 지나치면 자기를 타인의 시선에 종속시킨다. 자아실현이라고 부르는 행동을 들여다보면, 실제 동기의 상당 부분은 타인의 인정(D14)과 도파민적 성취감이다. 이것은 L3의 미성숙한 자유 추구와 구조적으로 같다.", "section": "개인 심리"}, {"id": "L7", "title": "인정욕이 너무 강하면 자기를 타인에게 맡기게 된다", "body": "D14, A4에 의해, 인정욕이 지나치면 자신의 가치를 판단하는 기준이 내 안에서 타인에게로 이동한다. 이렇게 되면 다른 사람의 평가가 불확실할 때마다 두려움이 생기고, 자존감이 타인의 반응에 종속되는 만성 불안 상태가 된다.", "section": "개인 심리"}, {"id": "L8", "title": "상상력이 풍부할수록 불안도 크다", "body": "A4, L1에 의해, 상상력이 풍부하다는 것은 불확실한 상황에서 더 많은 시나리오를 만들어낸다는 뜻이다. L1에 의하면 통제하려 할수록 두려움은 커지므로, 많은 시나리오를 만들어낼수록 그것을 통제하려는 시도도 커지고 불안의 총량도 커진다.", "section": "개인 심리"}, {"id": "L9", "title": "내가 어떤 굴레에 갇혀 있는지 아는 것만으로도 굴레는 약해진다", "body": "D11, L5에 의해, 완벽주의(D11)는 두려움에서 비롯된 자기방어 기제이다(L5). 이 구조를 모르면 완벽주의를 의지로 극복하려 하지만, 이 구조를 아는 순간 그 자동성이 약해진다. 완전히 벗어나는 것보다 인식이 먼저이며, 인식 자체가 이미 변화의 시작이다.", "section": "개인 심리"}, {"id": "L10", "title": "비교는 인정욕이 구체적으로 작동하는 방식이다", "body": "D14, A4에 의해, 다른 사람과 비교하는 것은 자신의 가치를 외부 기준으로 측정하려는 인정욕(D14)의 구체적 작동 방식이다. 비교할수록 기준점이 이동해서 만족이 구조적으로 불가능해지며, 이것은 만족이 구조적으로 불가능해지는 자기강화적 불만족을 낳는다. 비교를 멈추는 것은 의지의 문제가 아니라, 인정욕의 뿌리인 불확실성에 대한 두려움을 직면하는 것에서 시작된다.", "section": "개인 심리"}, {"id": "L11", "title": "심리 증상의 원인을 찾을 때 몸을 먼저 봐야 한다", "body": "A1에 의해, 몸의 이상이 원인이고 심리 증상이 결과인 경우가 있다. 여성의 감정 상태는 호르몬과 내분비계의 영향을 크게 받으므로, 우울·무기력 같은 심리 증상은 정신적 원인을 찾기 전에 먼저 호르몬 불균형·생리 주기 이상·갑상선 문제 등 신체적 원인을 확인해야 한다. 세상은 순서대로 움직이므로(A1), 원인을 건너뛰고 결과만 다루면 근본이 방치된다.", "section": "개인 심리"}, {"id": "L12", "title": "여유가 없으면 손해를 감수할 수 없다", "body": "D3에 의해, 여유가 없는 사람은 자기 자원을 지키는 데 급급하므로 다른 사람을 위해 손해를 감수하는 구조 자체가 불가능하다. 여유는 성숙의 논리적 전제 조건이다.", "section": "성숙"}, {"id": "L13", "title": "여유와 성숙의 순환은 작은 것부터 시작하면 된다", "body": "D1과 D3이 서로를 전제하는 것처럼 보이지만, 이 순환은 규모로 시작된다. 완전한 여유나 성숙이 없어도 지금 가진 것 안에서 할 수 있는 가장 작은 손해 감수부터 시작하면 된다. 작은 수용이 작은 여유를 낳고, 작은 여유가 더 큰 수용을 가능하게 하는 점진적 구조이다.", "section": "성숙"}, {"id": "L14", "title": "두려움은 없애려 할수록 커지고, 받아들이면 줄어든다", "body": "A4, L1, L2에 의해, 두려움을 억지로 제거하려는 노력 자체가 불확실성을 위협으로 굳힌다. 역설적으로, 두려움을 없애려는 시도를 멈추고 불확실성을 적절한 때의 일부로 받아들일 때 두려움의 총량이 줄어든다.", "section": "성숙"}, {"id": "L15", "title": "원하는 결과를 얻으려면 역방향으로 생각해야 한다", "body": "A1과 D9에 의해, 원하는 결과를 얻으려면 그 결과에서 역방향으로 거슬러 올라가야 한다. 충동적으로 순방향으로 돌진하면 시퀀스를 교란해서 원하는 결과에 도달하지 못한다.", "section": "성숙"}, {"id": "L16", "title": "적절한 때를 기다리는 것 자체가 여유의 실천이다", "body": "A3, A5, D3에 의해, 통제할 수 없는 것을 인정하고 적절한 때가 오기를 기다리는 행위는 여유가 충분할 때 가능하다. 이것은 포기가 아니라 절대적 질서(A5)에 대한 신뢰에 기반한 능동적 수용이다.", "section": "성숙"}, {"id": "L17", "title": "다른 사람을 수단이 아닌 목적으로 대하는 것이 성숙의 윤리적 표현이다", "body": "D15, D1에 의해, 성숙한 사람은 다른 사람을 자기 부족함을 채우는 수단으로 대하지 않는다. 타자의 고통과 필요를 내 이익과 상관없이 인식하고 반응하는 것이 성숙(D1)의 윤리적 차원이다.", "section": "성숙"}, {"id": "L18", "title": "성숙은 결심이 아니라 반복으로 굳어진다", "body": "L13에 의해, 작은 수용과 손해 감수의 반복이 여유를 형성하고, 형성된 여유가 더 큰 수용을 가능하게 한다. 성숙은 한 번의 큰 결심이 아니라 매일의 작은 실천이 쌓인 결과이다. 지금 가진 것 안에서 가능한 가장 작은 것부터 시작하면 이 반복에 진입할 수 있다.", "section": "성숙"}, {"id": "L19", "title": "감사는 소진되지 않는 만족의 실천이다", "body": "D2, D19에 의해, D19(도파민 중독)의 소진 구조와 달리, 감사는 새로운 자극을 추가하지 않고 이미 존재하는 것의 가치를 다시 인식하는 행위이다. 감사의 대상은 사라지지 않으므로 반복적으로 만족을 낳는다. 소진되는 것(D19)의 반대편에 소진되지 않는 것(감사)이 있으며, 이것이 D2의 행복에 도달하는 가장 낮은 비용의 경로이다.", "section": "성숙"}, {"id": "L20", "title": "침묵 공포의 뿌리는 여유 부재이다", "body": "A4, D3에 의해, 침묵은 불확실한 상태이다. 상대가 무엇을 생각하는지, 관계가 괜찮은지 알 수 없다. A4에 의하면 두려움의 뿌리가 불확실성이므로 침묵이 두렵게 느껴지는 것은 구조적으로 당연하다. 여유(D3)가 있는 사람은 이 불확실성을 버틸 수 있고, 여유가 없는 사람은 침묵을 위협으로 해석하고 즉각 반응하려 한다. 침묵을 견디는 능력은 현재 내 여유의 총량을 직접 측정하는 지표이다.", "section": "관계"}, {"id": "L21", "title": "침묵을 못 견디면 말이 불안을 대신한다", "body": "A4, D3, L20에 의해, 여유가 없는 상태에서 침묵이 찾아오면 그 불확실성을 말로 제거하려는 충동이 생긴다. 두 가지 방식으로 나타난다. 첫째, 말로 공백을 채운다. 침묵을 관계의 단절로 해석하고 불필요한 말을 덧붙인다. 이것은 침묵을 통제하려는 시도이다. 둘째, 자기중심적 대화로 흐른다. 상대의 말을 경청하기보다 자신의 이야기를 쏟아내거나 주제를 자신에게로 돌린다. 대화의 목적이 교감이 아니라 불안 해소에 있기 때문이다. 이 두 패턴은 모두 침묵의 불확실성을 말로 통제하려는 하나의 반응이다.", "section": "관계"}, {"id": "L22", "title": "인정욕이 강할수록 침묵이 더 두렵다", "body": "A4, D14, L20에 의해, 침묵 속에서 상대가 자신을 어떻게 평가하는지 알 수 없다. D14(인정욕구)가 강한 사람은 이 불확실성이 특히 크게 작동한다. 상대의 반응을 통해 자신의 가치를 확인하려는 욕구가 있는데, 침묵은 그 확인을 차단하기 때문이다. 그래서 말을 통해 상대의 반응을 끌어내려 하고, 이것이 L21의 자기중심적 대화와 결합하면 상대는 점점 소진된다.", "section": "관계"}, {"id": "L23", "title": "침묵을 채우기 위한 질문은 소통이 아니라 불안 관리이다", "body": "A4, D3, L20에 의해, 침묵이 불편한 사람은 질문을 대화의 도구가 아니라 침묵을 제거하는 도구로 사용한다. 이때 질문의 내용은 중요하지 않다. 상대가 대답하면 침묵이 사라지고 불안이 잠시 해소되기 때문이다. L21(두려움의 질문화)이 두려움을 숨기고 질문으로 위장하는 것이라면, 이것은 불안을 잠재우기 위해 질문을 소비하는 것이다. 상대는 이 구조를 감지하고 점점 대답이 의무처럼 느껴지게 된다. 반복되면 관계가 심문의 구조로 굳어진다.", "section": "관계"}, {"id": "L24", "title": "두려움을 질문으로 돌리면 소통이 막힌다", "body": "A4에 의해, 두려움을 직접 말하지 않고 질문이나 공격으로 돌려서 표현하면 상대방은 이를 공격으로 받아들이고 방어적으로 반응한다. 이것은 침묵에서 비롯된 것이 아니라 두려움 자체를 숨기려는 구조에서 온다. 말하는 사람은 두려움을 표현했다고 느끼지만, 듣는 사람은 공격을 받았다고 느끼는 구조적 엇갈림이 생긴다.", "section": "관계"}, {"id": "L25", "title": "두려움을 직접 고백하면 관계가 열린다", "body": "A4, L24에 의해, L24의 반대 경로가 있다. 두려움을 질문이나 공격으로 돌리는 대신 직접 고백하고 도움을 요청하면 상대방의 방어가 풀리고 공감과 협력이 가능해진다. \"왜 연락 안 했어?\"가 아니라 \"연락이 없어서 걱정됐어\"라고 말하는 것이다. 이것은 불확실성을 없애는 것이 아니라 불확실성 안에서 두려움을 인정하는 것이다. 이 인정이 상대방의 마음을 여는 유일한 경로이다.", "section": "관계"}, {"id": "L26", "title": "관계 유지 모드와 정보 교환 모드를 구분하지 못하면 소통이 어긋난다", "body": "A4, D7, O13에 의해, 상대가 관계 유지 모드로 말할 때 정보 교환 모드로 응답하면 상대는 공감을 거절당했다고 느낀다. 반대로 상대가 진짜 정보를 요청할 때 관계 유지 모드로만 응답하면 실질적 피드백 루프가 작동하지 않는다. 서로 기분을 맞춰주다 보면 진실보다 분위기를 선택하는 압력이 생기고, 이것은 D2(행복)가 아닌 집단 사고의 구조로 이어진다. 두 모드는 모두 필요하며, 납득(D7)의 출발점은 지금 상대가 어떤 모드를 필요로 하는지 먼저 읽는 것이다.", "section": "관계"}, {"id": "L27", "title": "rapport talk 환경에서 형성된 소통 패턴은 직접적 소통과 구조적 불일치를 낳는다", "body": "A4, O13, O14, L18에 의해, 관계 유지 모드가 지배적인 환경에서 오래 훈련된 사람은 간접적 표현과 눈치 읽기가 기본값이 된다. L18에 의하면 이 방식은 반복으로 굳어진다. 이 상태에서 직접적이고 사실 중심적인 소통 방식을 가진 상대를 만나면, 직접적 표현이 무례함이나 공격으로 해석되고 상대의 의도를 오독하게 된다. 반대로 상대는 간접적 신호를 읽지 못해 소통이 이루어졌다고 착각한다. 이것은 성격이나 의도의 문제가 아니라 서로 다른 소통 코드를 사용하는 구조의 문제이다.", "section": "관계"}, {"id": "L28", "title": "추측은 불안을 키우고, 직접 확인은 불안을 없앤다", "body": "A4, L8에 의해, 불확실한 상황에서 추측은 최악의 시나리오를 강화하는 방향으로 작동한다. 상상력이 풍부할수록(L8) 추측의 총량도 커지고 불안도 커진다. 반면 당사자와 직접 확인하면 불확실성이 사라지고 최악 시나리오 생성이 멈춘다. 대부분의 갈등은 사실이 아닌 추측에서 비롯된다.", "section": "관계"}, {"id": "L29", "title": "원하는 것으로 시작한 관계는 소진된다", "body": "D6, D19에 의해, 원하는 것은 도파민적 자극에 기반한 선호이므로(D6), D19의 소진 구조에 따라 자극이 줄어들면 관계의 근거를 잃는다. 원하는 것은 시간이 지나면 소진되지만, 필요한 것은 나의 부족함과 상대의 강점이 맞물리는 구조적 적합성이므로 지속성을 갖는다.", "section": "관계"}, {"id": "L30", "title": "지속 가능한 결합을 위해 역할 전환이 필요한 이유", "body": "O15, D4에 의해, 서로에게서 부모를 찾는 구조에서 출발한 관계가 지속되려면, 상대에게서 부모를 찾는 구조에서 스스로 부모가 되는 구조로 전환되어야 한다. 이 전환이 없으면 두 아이가 서로에게 부모를 요구하는 지속 불가능한 구조가 된다.", "section": "관계"}, {"id": "L31", "title": "깊은 관계는 희생을 요구하지만, 현대인은 이를 피하려 한다", "body": "D4와 D1에 의해, 관계의 깊이는 서로 희생하고 배려하는 만큼 비례한다. 그러나 자신의 부족함만 채우려는 사람은 희생의 구조에 들어가지 않으므로 깊은 관계는 구조적으로 만들어지지 않는다.", "section": "관계"}, {"id": "L32", "title": "상대방의 다름은 결핍이 아니라 보완 자원이다", "body": "D8에 의해, 파트너가 나와 다른 방식으로 행동하는 것은 틀린 것이 아니라 내가 주지 못하는 것을 주는 것일 수 있다. 자기 기준을 정답으로 투사하는 사람은 이 자원을 알아보지 못한다.", "section": "관계"}, {"id": "L33", "title": "목적 없는 결혼은 방향을 잃는다", "body": "A1, D9에 의해, 세상은 순서대로 움직이므로(A1) 목적이 없으면 어떤 선행 조건이 충족되어야 하는지 알 수 없다. 결혼의 목적을 모르고 맺어진 결합은 어떤 기준으로도 잘 되고 있는지 판단할 수 없어 결국 표류한다.", "section": "관계"}, {"id": "L34", "title": "모든 선택에는 비용이 이미 포함되어 있다", "body": "A2에 의해, 특정 장점이 극대화된 상대를 선택하는 것은 그 장점과 연동된 비용도 함께 선택하는 것이다. 이익만 취하고 비용을 거부하는 것은 A2에 위배된다.", "section": "관계"}, {"id": "L35", "title": "의무만 지고 권위는 없는 체계는 오래갈 수 없다", "body": "A2에 의해, 사회적 계약에서 의무와 권위는 한 쌍이다. 한쪽이 의무만 지고 그에 상응하는 권위를 빼앗기면, 그 계약을 유지할 합리적 동기가 사라진다.", "section": "관계"}, {"id": "L36", "title": "용서는 내가 붙들고 있던 짐을 내려놓는 것이다", "body": "A4, D3에 의해, 용서하지 못하는 상태는 상대에 대한 분노가 아니라 같은 상처가 반복될 것이라는 두려움을 붙들고 있는 상태이다. 성경적 용서의 구조(아피에미 — '보내다', '내려놓다')가 보여주듯, 용서는 상대가 받을 자격이 있어서 하는 것이 아니라 내가 먼저 받은 것이기에 내가 붙들고 있던 짐을 내려놓는 행위이다. 이 짐이 여유(D3)를 잠식하기 때문에, 용서하지 못하는 사람은 사랑(D5)의 구조적 선행 조건을 회복할 수 없다.", "section": "관계"}, {"id": "L37", "title": "세상이 약속하는 행복은 도파민 연쇄의 사회적 포장이다", "body": "D2, D19에 의해, 세상이 각 성취 단계마다(대학→연애, 취업→안정, 결혼→완성, 자녀→충족) 약속하는 것은 D2의 행복이 아니라 D19의 도파민 자극이다. 각 단계의 자극이 소진되면 다음 단계가 제시되며, 잠깐의 성취감 외에는 다음 의무와 고통만 남는다. 각 단계의 만족이 소진되면 다음 단계의 목표가 제시되며, 잠깐의 성취감 외에는 다음 의무와 고통만 남는다.", "section": "사회 구조"}, {"id": "L38", "title": "성취 중심의 삶은 결핍을 키우며 허무로 향한다", "body": "L37, D2에 의해, 성취로 얻는 만족은 소진되면 더 큰 공허함을 남기고, 욕심은 끝이 없으므로 더 큰 성취를 계속 요구한다. 이 구조는 중독의 내성과 같으며, 쌓일수록 삶의 의미가 성취 자체에 종속되어 성취가 소진되는 순간 삶의 목적이 공백이 된다.", "section": "사회 구조"}, {"id": "L39", "title": "자기 방식으로 사랑을 주는 것과 상대에게 닿는 방식으로 주는 것은 다르다", "body": "D5, D8, D20에 의해, 사랑(D5)의 본질은 하나이지만 그것이 상대에게 닿는 경로는 D20에 의하면 사람마다 다르다. 내가 자연스럽게 표현하는 방식이 상대의 사랑 언어와 다를 때, 두 사람은 서로 진심으로 사랑하면서도 사랑받지 못한다고 느낀다. D8에 의하면 파트너의 다름을 자원으로 보는 것이 상호보완의 출발이듯, 상대의 사랑 언어가 나와 다른 것은 틀린 것이 아니라 다른 것이다. 자기 방식으로만 사랑을 표현하는 것은 D8의 파트너십 구조를 사랑 표현에서 무너뜨리는 행위이다.", "section": "사랑의 언어"}, {"id": "L40", "title": "세계관 차이가 클수록 관계 유지 비용도 구조적으로 크다", "body": "A2, A6에 의해, 세상의 원리는 하나이지만(A6) 그것을 이해하는 세계관은 성장 환경에 따라 다르게 형성된다. 성장 환경이 다를수록 세계관의 차이는 크고, A2에 의하면 모든 선택에는 비용이 따르므로 세계관 차이가 클수록 서로 맞춰가는 비용도 크고, 그 비용은 노력으로 줄일 수 있지만 완전히 없애기 어려운 태생적 성격을 갖는다. 이것은 결혼에 극복하기 힘든 태생적 한계가 존재함을 의미한다.", "section": "세계관"}, {"id": "L41", "title": "나에게 자명한 것이 상대에게 자명하지 않을 때가 관계에서 가장 소진되는 지점이다", "body": "A6에 의해, 성장하면서 공기처럼 흡수된 가정(assumption)들은 본인이 가정을 하고 있다는 사실조차 인식하지 못한다. 밥을 먹는 방식, 돈을 쓰는 방식, 갈등을 다루는 방식, 부모를 대하는 방식 — 이것들은 설명 없이 당연한 것으로 작동한다. 이것이 상대와 부딪힐 때 \"왜 이게 틀렸지?\"가 아니라 \"왜 이게 당연하지 않지?\"라는 당혹감이 된다. 이 당혹감은 악의가 아닌 구조에서 오며, 반복될수록 관계를 소진시킨다.", "section": "세계관"}, {"id": "L42", "title": "다른 세계관은 같은 원리를 다른 각도에서 본 것일 수 있다", "body": "A6에 의해, 세상의 원리가 하나라면 서로 다른 세계관은 같은 원리를 다른 각도에서 이해한 것이다. 따라서 상대의 세계관이 나와 다르다는 것은 상대가 틀렸다는 증거가 아니라, 내가 보지 못하는 각도에서 같은 진리를 보고 있을 가능성이다. 이것은 판단을 멈추고 이해로 전환하는 논리적 근거이다. 단, A6는 모든 세계관이 동등하게 옳다는 상대주의를 말하는 것이 아니라, 다름이 곧 틀림이 아님을 말한다.", "section": "세계관"}, {"id": "L43", "title": "고유한 목적은 욕심과 반대 방향에 있다", "body": "P1a, D16, L39에 의해, 소진 구조(L39)에서 욕심은 채워져도 소멸하지 않고 더 큰 대상으로 이동하며, 이 구조는 허무로 수렴한다(L39). 반면 P1a에 의해 고유한 목적은 외부적 기준에서 부여된 완결된 방향이므로, 욕심처럼 소진되지 않는다. 욕심은 내 안에서 끝없이 팽창하는 방향이고, 고유한 목적은 외부에서 주어진 특정한 방향이다. 따라서 욕심을 내려놓을수록 목적에 가까워지고, 욕심을 추구할수록 목적에서 멀어진다.", "section": "인생의 목적"}, {"id": "L44", "title": "절대자의 설계는 연구나 분류로 알아낼 수 없다", "body": "P1b, A5에 의해, 절대자의 설계는 사람마다 고유하므로 분류하거나 일반화할 수 없다. 사례를 아무리 많이 연구하고 분류해서 대입해도 개인의 설계에 도달하지 못한다. 설계를 아는 유일한 경로는 연구가 아니라 설계자와 직접 관계 맺는 것이다.", "section": "인생의 목적"}, {"id": "L45", "title": "절대자를 신뢰하면 불확실성이 두려움에서 평안으로 바뀐다", "body": "A4, A5, P1b, D18에 의해, 불확실성은 절대자와 그 계획을 신뢰하지 않는 사람에게는 두려움의 원천이다. 그러나 절대자가 나보다 크고 나를 위한 계획을 갖고 있다는 것을 신뢰하는 사람에게는 불확실성이 위협이 아니라 아직 드러나지 않은 계획의 일부로 받아들여진다. 이 신뢰가 두려움-회피 연쇄를 차단하고 평안(D18)을 낳는다.", "section": "인생의 목적"}, {"id": "L46", "title": "사주나 점은 P1a의 세속적 직관이다", "body": "P1a, A5에 의해, 사주팔자·점 등 운명론적 믿음은 미신처럼 보이지만 구조적으로는 내 인생에 고유한 목적과 설계가 있다는 전제를 직관적으로 받아들이는 행위이다. 이것은 P1a와 구조적으로 같지만, 해독 경로를 연구와 분류에서 찾는다는 점에서 L41의 한계를 갖는다.", "section": "인생의 목적"}, {"id": "L47", "title": "두려움을 직면하는 것은 의지가 아니라 더 큰 신뢰가 있을 때 가능하다", "body": "L14, L46에 의해, 두려움을 직면하는 능력은 \"이겨내겠다\"는 의지에서 오지 않는다. 두려움보다 더 크고 신뢰할 수 있는 무언가가 있을 때 비로소 두려움 쪽으로 돌아설 수 있다. P1b에 의해, 절대자가 나보다 크다는 신뢰(L44)가 그 근거이다. P1a에 의해서도, 나에게 고유한 방향이 있다는 믿음이 두려움을 직면하게 하는 힘이 된다.", "section": "인생의 목적"}, {"id": "L48", "title": "고통은 방향이 잘못되었다는 경보이다", "body": "A3, P1a, P1b, D16에 의해, 삶의 고통은 없애야 할 적이 아니라 방향의 이상을 알리는 신호이다. 몸의 통증이 신체 이상을 알리는 경보이듯, 삶의 고통은 지금의 방향이 고유한 목적(D16)과 어긋났음을 알린다. C.S. 루이스가 관찰한 대로, 고통은 자기 충분성의 환상을 깨뜨리고 내가 스스로 방향을 잡을 수 없음을 드러낸다. 고통에 대한 두 가지 반응이 있다: 경보를 끄는 것(도파민, 회피, 마취)과 경보가 가리키는 방향을 읽는 것. P1b에 의해, 그 방향의 끝은 절대자의 계획이다.", "section": "인생의 목적"}], "T": [{"id": "T1", "title": "억지로 통제하려는 것이 고통의 구조적 원인이다", "body": "A3, A4에 의해: 인간은 적절한 때를 인간의 속도로 통제하려 하지만, 이 시도는 구조적으로 실패한다. 이 실패가 반복될 때 불안과 고통이 쌓인다. 통제가 아닌 수용이 고통을 줄이는 구조적 경로이다.", "section": "개인론"}, {"id": "T2", "title": "정서적으로 미성숙한 것은 성숙이 완성되지 않은 상태이다", "body": "D1, L4에 의해: 정서적 미성숙이란 감정 조절과 관계 조율 능력이 자라지 못한 상태이다. 감정을 사실로 등치하는 한(L4) 성숙(D1)에 도달할 수 없으며, 불확실성을 직면하지 못하는 한 이 상태는 지속된다.", "section": "개인론"}, {"id": "T3", "title": "자아가 강할수록 역설적으로 더 취약하다", "body": "A4, D12, L2, L14에 의해: 자아가 강할수록 불확실성을 억지로 제거하려는 시도가 강해지고, 그 시도가 강할수록 통제가 안 되는 현실과의 충돌이 커진다. 자아를 줄이고 적절한 때를 신뢰할 때 비로소 두려움이 줄어든다.", "section": "개인론"}, {"id": "T4", "title": "인정욕에 기댄 자아실현은 오히려 자아를 잃게 만든다", "body": "D14, L6, L7에 의해: 인정욕에 기반한 자아실현 추구는 역설적으로 자기를 타인에게 종속시킨다. 진정한 자아실현은 타인의 평가와 상관없는 내적 기준을 갖는 것이며, 이것은 성숙(D1)과 자아 내려놓음(D13)을 통해서만 가능하다.", "section": "개인론"}, {"id": "T5", "title": "완벽한 파트너는 구조적으로 존재하지 않는다", "body": "A2, D11, L5에 의해: 모든 사람은 이익-비용 구조 안에 있으므로 어떤 강점도 반드시 비용을 수반한다. 완벽주의적 기준으로 파트너를 찾으려는 시도는 A2를 위반하며, 완벽한 파트너를 찾는 행동 자체가 완벽주의라는 자기방어 기제의 발현이다.", "section": "개인론"}, {"id": "T6", "title": "진짜 행복은 욕구 충족이 아닌 곳에 있다", "body": "D2, D19에 의해: 욕구만 따르는 삶은 D19의 도파민 자극을 극대화하지만 D2가 정의하는 행복에 이르지 못한다. 도파민 자극은 자극의 부재를 피하는 것이고, 행복은 책임과 연결과 의미를 향해 나아가는 것이기 때문이다. 진짜 행복은 자유를 제한하고, 책임을 받아들이고, 다른 사람과 연결되고, 의미 있게 기여하는 것을 포함한다.", "section": "개인론"}, {"id": "T7", "title": "세상은 이익-비용 구조로 환원된다", "body": "A2, L35에 의해: 물리학부터 경제학까지 모든 시스템에서 어떤 것의 극대화는 반드시 다른 것의 비용을 수반한다. 인간관계도 예외가 아니다. 이 법칙을 내면화한 사람은 선택의 비용을 받아들이므로 갈등의 총량이 구조적으로 줄어든다.", "section": "개인론"}, {"id": "T8", "title": "성숙이란 순서를 알고 적절한 때를 기다리는 것이다", "body": "A1, A3, L15, D1에 의해: 성숙한 사람이란 시퀀스를 역방향으로 추론하면서도 적절한 때를 강요하지 않고 기다리는 사람이다. 충동적으로 행동하는 것은 시퀀스의 임의 지점에 개입하고 적절한 때를 교란하므로 구조적으로 실패에 가깝다.", "section": "개인론"}, {"id": "T9", "title": "부모성은 성숙의 완성형이다", "body": "D4, D1, L12에 의해: 조건 없는 희생을 본질로 하는 부모성은 여유를 전제로 하고, 여유는 성숙을 전제로 한다. 부모가 된다는 것은 성숙(D1)의 완성된 형태이며, 다른 사람을 수단이 아닌 목적으로 대하는 윤리적 전환을 포함한다.", "section": "개인론"}, {"id": "T10", "title": "내려놓음은 포기가 아니라 더 큰 질서에 합류하는 것이다", "body": "A5, D13, L16에 의해: 억지 통제를 내려놓는 것은 무력함이 아니다. 절대적 질서가 적절한 때의 방식으로 작동하는 방향을 신뢰하고 그 흐름에 합류하는 것이다. 가장 정확한 순서는 인간의 통제가 아닌 더 큰 질서 안에 있다.", "section": "개인론"}, {"id": "T11", "title": "다른 사람의 고통을 외면하지 않는 것이 성숙의 윤리적 완성이다", "body": "D15, D4, L17에 의해: 성숙한 사람은 다른 사람의 고통을 자신의 이익 안에서만 처리하지 않는다. 타자를 수단이 아닌 목적으로 대하는 것이 성숙(D1)의 윤리적 완성이며, 이것은 부모성(D4)의 사회적 확장이다.", "section": "개인론"}, {"id": "T12", "title": "공동체는 개인이 혼자 유지할 수 없는 성숙을 가능하게 한다", "body": "D3, D17, L13, L18에 의해: 여유와 성숙의 순환(L13)은 혼자 유지하기 어렵다. 내 여유가 바닥났을 때 순환을 지속시켜 줄 외부 구조가 없으면 실천이 끊기고 성숙이 후퇴한다. 공동체(D17)는 이 간극을 메우는 구조적 환경이다. 내 여유가 부족할 때 공동체의 여유가 보완하고, 반복적 실천(L18)이 공동체 안에서 계속될 수 있게 한다. 고통(L48)의 경보를 혼자 읽기 어려울 때 함께 읽고, 용서(L37)와 감사(L19)가 관계 속에서 실제로 일어나는 장소가 공동체이다.", "section": "개인론"}, {"id": "T13", "title": "사랑은 도파민과 반대편에 있다", "body": "D5, D19에 의해: 사랑을 D19의 도파민 자극으로 경험하는 한 그것은 반드시 소진된다. 사랑의 본질은 자극이 아니라 적절한 때를 기다리며 불확실성을 견디는 힘이며, 이것은 T6의 행복과 같은 구조이다.", "section": "관계론"}, {"id": "T14", "title": "건강한 소통의 전제는 감정과 사실을 분리하는 것이다", "body": "A4, D10, L4, L21에 의해: 건강한 소통은 바라는 것을 먼저 분명히 말하고, 두려움을 고백하며 도움을 구하는 구조에서 성립한다. 감정을 사실로 등치하거나 두려움을 질문으로 돌리는 한, 소통은 구조적으로 왜곡된다.", "section": "관계론"}, {"id": "T15", "title": "여유가 있어야 침묵과 불확실성을 견딜 수 있다", "body": "A4, D3, L20, L12에 의해: 여유가 없는 사람은 침묵을 위협으로 해석하고 서둘러 채우려 한다. 여유가 있는 사람은 침묵과 불확실성을 적절한 때의 일부로 견디며 상대가 스스로 열릴 때까지 기다릴 수 있다.", "section": "관계론"}, {"id": "T16", "title": "납득이 있어야 관계가 지속된다", "body": "D7에 의해: 부모-자식, 부부, 조직 등 모든 지속적 관계에서 규범의 진짜 이유를 설명하지 못하면 상대방은 내적으로 받아들이지 않는다. 강제에 의한 복종은 일시적이며, 납득에 의한 수용만이 관계를 지속시킨다.", "section": "관계론"}, {"id": "T17", "title": "결혼은 위아래 없는 상호보완적 동업이다", "body": "D8, L29에 의해: 결혼은 위계적 복종 관계가 아니라 서로 다른 능력을 가진 두 사람의 동업 구조이다. 파트너의 다름을 자기 기준으로 교정하려는 시도는 보완 자원을 파괴하며, 이것은 결합의 존재 이유를 스스로 훼손하는 행위이다.", "section": "관계론"}, {"id": "T18", "title": "결혼은 가장 작은 공동체를 만드는 행위이다", "body": "T17, D17, D8에 의해: 결혼은 두 사람이 상호보완적 파트너십(D8)을 바탕으로 만드는 가장 작은 단위의 공동체(D17)이다. 공동체는 목적을 가지며, 서로 돌보고 책임을 나누는 구조이다. 따라서 결혼은 두 사람만의 행복을 위한 계약이 아니라, 함께 무언가를 만들어가는 방향을 갖는 창조 행위이다. 이 공동체는 D4(부모성)로 확장될 수 있는 열린 구조이며, L28에 의하면 방향이 없으면 표류한다.", "section": "관계론"}, {"id": "T19", "title": "지속 가능한 결혼을 위한 네 가지 조건", "body": "L12, L30, L31, L34, D6에 의해: 지속 가능한 결혼에는 네 가지 조건이 필요하다. 첫째, 왜 결혼하는지에 대한 자각. 둘째, 원하는 것이 아닌 필요한 것으로 상대 선택. 셋째, 상대에게서 부모를 찾는 구조에서 스스로 부모가 되는 역할 전환(L29). 넷째, 손해를 감수할 수 있는 여유 확보.", "section": "관계론"}, {"id": "T20", "title": "의무감으로 하는 결혼은 행복할 수 없다", "body": "T6에 의해: 사회적 의무로 맺어진 결혼은 내적 동기가 없으므로, 행복(D2)이 정의하는 조건을 구조적으로 충족하지 못한다.", "section": "관계론"}, {"id": "T21", "title": "결혼의 시퀀스", "body": "T19, T8, L12에 의해: 행복한 결혼이라는 결과 R에 이르는 논리적 시퀀스는 다음과 같다:\n> 여유의 확보 → 성숙 → 목적의 자각 → 필요한 것 기반 선택 → 역할 전환 → R\n\n도파민적 끌림에서 출발하는 것은 시퀀스의 잘못된 지점에서 시작하는 것이다. 단, 적절한 때의 개입은 이 시퀀스를 예상치 못한 방식으로 완성할 수 있다.", "section": "관계론"}, {"id": "T22", "title": "평가 기준의 비대칭이 관계 실패를 만든다", "body": "D6, L28, L30에 의해: 남성과 여성이 평균적으로 서로 다른 기준으로 상대를 평가하는 경향이 있는 한, 양쪽 모두 필요한 것이 아닌 원하는 것을 기준으로 선택하기 쉽다. 이것은 소진되는 결합을 낳고, 희생 구조에 들어가지 않으면 관계가 깊어지지 않는다.", "section": "사회론"}, {"id": "T23", "title": "현대 성별 역할 갈등의 구조적 원인", "body": "L30에 의해: 한 성별이 기존 역할 체계에서 권리만 가져가고 의무를 억압이라고 규정하면, 상대 성별은 양쪽 역할의 의무를 모두 떠안게 된다. 이 구조는 지속 불가능하며, 상대 성별이 계약을 거부하는 것은 합리적 반응이다.", "section": "사회론"}, {"id": "T29", "title": "결혼을 찾는 남녀의 소통은 서로 다른 소통 코드를 가진 두 세계관의 만남이다", "body": "L26, L27, L41, L42, L43, D7, A6에 의해: rapport talk가 기본값인 사람과 report talk가 기본값인 사람이 만나는 것은 단순한 스타일 차이가 아니라 L41의 세계관 차이 구조 안에 있다. L42에 의하면 나에게 자명한 것이 상대에게 자명하지 않을 때가 가장 소진되는 지점이며, 소통 코드의 차이는 이 자명함의 비대칭이 가장 직접적으로 드러나는 영역이다.\n\n이 상황에서 각자에게 필요한 것이 다르다. 간접 소통이 기본값인 쪽에게는 원하는 것을 직접 말로 표현하는 것이 필요하다. 상대가 신호를 읽지 못하는 것은 무관심이 아니라 코드가 다르기 때문이다(L27). 직접 소통이 기본값인 쪽에게는 상대가 지금 정보를 원하는지 연결을 원하는지 먼저 확인하는 것이 필요하다. 직접적 응답이 오히려 관계를 해칠 수 있다(L26).\n\n그러나 두 가지 전제가 먼저 성립해야 한다. 첫째, A6에 의하면 세상의 원리는 하나이므로 L43에 의해 서로 다른 소통 방식은 틀린 것이 아니라 같은 원리를 다른 각도에서 표현한 것임을 받아들여야 한다. 둘째, D7(납득)에 의해 이 구조적 차이를 서로가 납득해야만 변화가 시작된다. 납득 없이는 어떤 기술도 작동하지 않는다.", "section": "인생 목적론"}, {"id": "T30", "title": "회피형 남자는 성격의 문제가 아니라 반복적 소진 구조에 대한 합리적 반응이다", "body": "T29, O12, O14, L27, L12, D3, D7에 의해: T29에서 보았듯 rapport talk가 기본값인 사람과의 대화는 report talk가 기본값인 사람에게 지속적인 해독 비용을 발생시킨다. 상대의 간접 신호를 읽어야 하고(O14), 추측이 틀리면 관계가 손상되며, 직접 응답하면 상처를 준다. 이 구조가 반복되면 O12(소진 구조)에 따라 대화 자체가 에너지 적자 구조가 된다.\n\n여기에 O10(두려움의 질문화 패턴)이 더해지면 상대의 불안이 질문이나 공격으로 변환되어 들어오고, D12(강한 자아)의 방어 반응이 활성화된다. L12에 의해 여유(D3)가 소진된 상태에서는 손해 감수 자체가 불가능하다. 이 모든 구조가 누적된 결과가 회피이다.\n\n회피는 냉담함이 아니라 반복적 소진을 막기 위한 구조적 자기보호이다. 따라서 회피를 성격 문제로 접근하면 해결되지 않는다. T29의 결론처럼, 해법의 전제는 기술이 아니라 D7(납득) — 서로의 소통 코드가 왜 다른지를 먼저 이해하는 것이며, 그 이해가 D3(여유)를 회복시키는 첫 번째 조건이다.", "section": "인생 목적론"}, {"id": "T24", "title": "욕심을 동력으로 삼는 삶은 결국 허무로 끝난다", "body": "L38, L39에 의해: 성취와 욕심을 삶의 중심에 놓으면 더 큰 성취를 향해 끊임없이 이동하지만, 각 성취의 만족은 소진 후 더 큰 공허함으로 바뀐다. 세상이 각 단계마다 약속하는 행복(L39)도 이 구조의 사회적 포장이다. 성취는 내면의 행복과 구조적으로 분리되어 있으며, 이 연쇄의 정직한 끝은 허무이다.", "section": "사회론"}, {"id": "T25", "title": "인생의 목적은 성취 밖에 있다", "body": "P1a, D16, T24에 의해: 성취와 욕심을 동력으로 삼는 삶은 T24에 의해 허무로 수렴한다. 허무의 반대편은 더 큰 성취가 아니라 나만의 고유한 방향(D16)을 발견하는 것이다. 이 방향은 도파민에 의해 소진되지 않는다. P1b 없이도 성립한다.", "section": "인생 목적론"}, {"id": "T26", "title": "관계와 기여가 소진되지 않는 행복의 구조이다", "body": "D2, D15, T11에 의해: P1b를 받아들이지 않더라도, 다른 사람과 진정으로 연결되고 그를 위해 기여하는 것은 도파민적 소진 구조를 갖지 않는다. 관계와 기여에서 발견되는 의미는 성취와 달리 유효기간이 없으며, 행복(D2)에 도달하는 대안적 경로이다.", "section": "인생 목적론"}, {"id": "T27", "title": "절대자의 인정이 자아실현의 유일한 비소진 기반이다", "body": "D14, D16, A5, P1b에 의해: 인간의 인정욕(D14)은 타인의 평가에 종속되어 불안을 낳고 소진된다. 그러나 절대자로부터 부여된 고유한 목적(D16)을 기반으로 삼는 사람은 타인의 평가와 상관없는 내적 기준을 갖는다. 이것이 T4에서 말하는 진정한 자아실현의 완전한 구조적 기반이다.", "section": "인생 목적론"}, {"id": "T28", "title": "운명론은 P1의 세속적 표현이지만 해독 경로가 다르다", "body": "L45, L43, P1a에 의해: 운명론적 믿음은 고유한 목적의 존재를 직관적으로 인정한다는 점에서 P1a와 구조적으로 같다. 그러나 그 설계를 연구·분류·대입으로 해독하려 한다는 점에서 L39의 한계에 부딪힌다. 사람마다 모두 다르므로 일반화로는 개인의 고유한 방향에 도달할 수 없다. 운명론이 P1a를 넘어 P1b까지 나아가려면, 분류와 통계가 아닌 목적을 부여한 절대자와 직접 관계 맺는 것으로 전환되어야 한다.", "section": "인생 목적론"}], "C": [{"id": "C1", "title": "행복은 책임을 받아들이는 데서 온다", "body": "T6, L3에 의해: 사춘기식 자아실현과 주체성 추구는 자유를 확장하는 것처럼 보이지만, 실제로는 불확실성에 대한 책임 회피에서 오는 불안을 심화시킨다. 역설적으로, 책임을 받아들이는 것이 불안으로부터의 자유를 낳는다."}, {"id": "C2", "title": "내가 어떤 굴레에 있는지 아는 것이 변화의 최소 조건이다", "body": "L9에 의해: 완벽주의, 두려움의 질문화, 정서적 미성숙 등의 반복적 굴레에서 벗어나는 것은 그 구조를 인식하는 순간부터 시작된다. 완전히 벗어나는 것이 목표가 아니라 인식이 먼저이다."}, {"id": "C3", "title": "자아를 줄이는 것이 성숙의 더 깊은 조건이다", "body": "T3, D1에 의해: 성숙은 단순히 충동을 참는 것이 아니라 통제 욕구의 뿌리를 해체하는 것을 포함한다. 자아를 줄인 사람만이 자아 내려놓음(D13)에 도달할 수 있다."}, {"id": "C4", "title": "완벽주의와 인정욕은 같은 뿌리에서 나온다", "body": "D11, D11, A4에 의해: 완벽주의는 결과에 대한 비판을 두려워하는 것이고, 인정욕은 존재에 대한 평가를 두려워하는 것이다. 둘 다 불확실성에 대한 두려움에서 비롯되며, 해소의 경로도 같다."}, {"id": "C5", "title": "불안의 처방은 추측을 멈추고 직접 확인하는 것이다", "body": "A4, L8, L26에 의해: 상상력이 풍부한 사람일수록 불확실한 상황에서 추측을 멈추고 직접 확인하는 것이 불안을 줄이는 가장 효율적인 방법이다. 이것은 뇌의 메커니즘에 대한 구조적 대응이다."}, {"id": "C6", "title": "심리 치료 전에 신체 검진이 먼저다", "body": "L11에 의해: 여성의 감정적 어려움에 대한 정신과적 접근은 호르몬·내분비계 등 신체적 원인을 배제한 이후에 이루어져야 한다."}, {"id": "C7", "title": "조급함은 때를 강요하는 행위이다", "body": "T8에 의해: 결과를 억지로 먼저 취하려는 조급함은 시퀀스를 무시하고 적절한 때를 강요하는 것이다. 인내는 미덕이 아니라 때의 구조에 대한 인식의 결과이다."}, {"id": "C8", "title": "시작할 준비가 되기를 기다리면 영원히 시작하지 못한다", "body": "L13에 의해: 여유와 성숙이 충분해지면 시작하겠다는 태도는 순환의 구조를 이해하지 못하는 것이다. 순환은 완성된 여유나 성숙이 있어야 시작되는 것이 아니라, 지금 가진 것 안의 가장 작은 실천에서 시작되고 그 실천이 여유와 성숙을 만들어낸다."}, {"id": "C9", "title": "인내는 적절한 때에 대한 신뢰이다", "body": "T10, A5, D5에 의해: 사랑이 요구하는 인내는 단순히 참는 것이 아니라 적절한 때가 올 것이라는 신뢰에서 나온다. 신뢰 없는 인내는 억압이고, 신뢰 있는 인내는 수용이다."}, {"id": "C10", "title": "여유는 사랑의 구조적 전제 조건이다", "body": "D3, L12, D5에 의해: 여유가 없으면 손해를 감수할 수 없고, 손해를 감수하지 못하면 인내할 수 없으며, 인내할 수 없으면 사랑(D5)을 실현할 수 없다. 여유는 사랑의 감정적 조건이 아니라 구조적 전제 조건이다."}, {"id": "C11", "title": "두려움을 어떻게 표현하느냐가 관계의 질을 결정한다", "body": "T14, L21에 의해: 두려움을 질문으로 우회하면 갈등이 생기고, 두려움을 고백으로 직면하면 친밀감이 생긴다. 관계의 질은 감정의 크기가 아니라 표현하는 방향과 방식에 의해 결정된다."}, {"id": "C12", "title": "선택의 비용을 미리 받아들이면 갈등이 줄어든다", "body": "T7, L29에 의해: 선택한 상대의 강점에 내재된 비용을 미리 받아들인 사람은 그 비용이 현실화되었을 때 갈등을 겪지 않는다. 경제적 남성은 가정 시간이 적고, 가정적 남성은 경제적 성취가 적으며, 다정한 남성은 주도성이 낮다. 이것을 받아들이지 않는 것은 A2에 위배된다."}, {"id": "C13", "title": "자기 기준을 상대에게 투사하면 관계가 깨진다", "body": "T17, L27에 의해: \"왜 나처럼 안 하느냐\"는 질문은 파트너십의 구조를 위계 구조로 바꾸는 행위이다. 이것은 상대의 보완 자원을 결핍으로 오독하는 것이며, 관계의 본질적 이점을 스스로 지우는 행위이다."}, {"id": "C14", "title": "내가 받은 용서가 내가 주는 용서의 근거이다", "body": "L37, P1b에 의해: 절대자에게 먼저 용서를 받았다는 인식(P1b)은 타인을 용서하는 것을 의무가 아닌 수용의 자연스러운 흘러넘침으로 만든다. 용서를 받지 못했다고 느끼는 사람은 용서할 내적 자원이 없고, 용서를 받았다는 것을 아는 사람에게는 용서가 짐이 아닌 자유가 된다."}, {"id": "C15", "title": "상대의 세계관은 틀린 것이 아니라 다른 환경에서 형성된 것이다", "body": "L41, L43에 의해: 상대가 당연하게 여기는 것들은 그의 성장 환경에서 공기처럼 형성된 것이다. 이것은 그의 의도나 성격의 문제가 아니라 구조의 문제이다. L43에 의하면 다른 세계관은 같은 원리를 다른 각도에서 이해한 것일 수 있다. 이것을 인정하는 것이 판단과 요구에서 이해와 협상으로 전환하는 첫 번째 조건이다. 그러나 세계관의 차이가 클수록 그 비용도 크며, 이것이 상대를 선택할 때 D6(원하는 것 vs 필요한 것)의 기준 안에 반드시 포함되어야 하는 이유이다."}, {"id": "C16", "title": "감사는 행복에 이르는 가장 낮은 비용의 실천이다", "body": "L19, D2, O10에 의해: 성취는 소진되지만 감사는 소진되지 않는다. 이미 가진 것을 새롭게 인식하는 감사는 추가 비용 없이 반복적 만족을 낳는다. 행복(D2)의 실천적 첫 걸음으로 감사보다 낮은 비용의 경로는 없다."}, {"id": "C17", "title": "현대의 결혼 기피는 역할 비대칭 구조의 합리적 결과이다", "body": "T22, T18에 의해: 현대의 결혼 기피와 파혼 증가는 개인의 이기심이 아니라 역할 비대칭 구조(O8)가 만들어낸 합리적 반응이다. 이것을 개인 차원에서 해결하려는 시도는 구조적 원인을 방치한다."}, {"id": "C18", "title": "권리만 가져가고 의무는 억압이라 부르는 구조는 지속 불가능하다", "body": "T22, A2에 의해: 신여성상의 권리(자유·자립)와 구여성상의 권리(보호·헌신)만 결합하고 각각의 의무를 억압이라고 규정하는 구성은 이익-비용 법칙(A2)을 위반하며, 역할 비대칭(O8)을 극대화한다. L30에 의해 이 구조는 지속 불가능하다."}, {"id": "C19", "title": "세상의 행복 약속이 도파민 포장임을 아는 것이 첫 번째 탈출이다", "body": "L38, T25, L9에 의해: 대학-취업-결혼-자녀로 이어지는 세상의 행복 약속이 도파민 연쇄의 사회적 포장임을 인식하는 순간, 그 연쇄의 자동성이 약해진다."}, {"id": "C20", "title": "공허함은 치료가 아니라 방향 전환을 필요로 한다", "body": "T24에 의해: 성취 중독과 욕심에서 오는 공허함은 심리적 치료의 대상이 아니라 삶의 방향이 잘못 설정되었다는 신호이다. 처방은 더 큰 성취가 아니라 고유한 목적(D16)을 찾는 방향 전환이다."}, {"id": "C21", "title": "절대자를 신뢰하는 것이 여유와 수용의 궁극적 기반이다", "body": "A5, P1b, L46, D3, D13에 의해: 여유(D3)와 자아 내려놓음(D13)은 L40의 신뢰 없이는 기반이 취약하다. 절대자가 나보다 크고 적절한 때를 계획하신다는 인식이 불확실성을 두려움이 아닌 평안(D18)으로 전환시키는 궁극적 조건이다."}, {"id": "C22", "title": "허무는 절대자로부터 멀어졌다는 신호이다", "body": "L39, A5, P1b에 의해: 성취 중심의 삶이 허무로 수렴하는 것은 단순한 심리적 현상이 아니라 절대자의 질서에서 벗어났다는 신호이다. 허무는 고유한 목적(D16)을 찾지 못했거나 벗어났을 때 필연적으로 생긴다."}, {"id": "C23", "title": "풍성함과 공허함은 절대자와의 관계로 결정된다", "body": "P1b, T27, T26에 의해: 절대자가 허락하신 적절한 때 안에 머물며 고유한 목적(D16)을 향해 나아가는 상태가 풍성함이다. 절대자의 질서에서 벗어나 욕심과 성취를 삶의 중심에 놓는 상태가 공허함이다."}]};
var PROOF=[{"title": "시작: 무엇을 증명하는가", "body": "A1에 의하면 세상은 순서대로 움직인다. 원하는 결과를 얻으려면 그 결과에 이르는 선행 조건들을 역방향으로 거슬러 올라가야 한다. 따라서 \"행복한 결혼\"이라는 결과에서 출발해서, 그것이 성립하기 위해 무엇이 선행되어야 하는지를 역방향으로 추적한다.\n\n단, 출발하기 전에 한 가지를 명확히 해야 한다. \"행복한 결혼\"에서 말하는 행복이 무엇인지 정의하지 않으면 증명 자체가 불가능하다.\n\n행복(D2)은 욕구를 다 채우는 것이 아니다. 책임을 받아들임으로써 불안에서 자유로워지고, 다른 사람과 진짜로 연결되며, 의미 있게 기여하고, 나만의 방향을 향해 나아가는 복합적인 상태이다.\n\n이것과 구별해야 할 것이 도파민 중독(D19)이다. D19는 자극의 부재를 견디지 못해 도파민을 유발하는 것을 찾고 의지하는 상태이다. 설레임, 강렬한 끌림, 상대가 나를 채워준다는 느낌은 모두 D19의 도파민 자극이지 D2의 행복이 아니다. 이 둘을 구별하지 못하면 결혼의 모든 판단이 처음부터 잘못된 기준 위에 서게 된다.\n\n이제 역방향 추적을 시작한다."}, {"title": "역방향 1: 행복한 결혼이 되려면 역할 전환이 필요하다", "body": "T21에 의하면 행복한 결혼에 이르는 시퀀스의 마지막 단계는 역할 전환이다. 왜 역할 전환이 없으면 행복한 결혼이 불가능한가?\n\nL30에 의하면 결혼을 앞둔 사람은 자신의 지배 충동을 받아줄 원초적 대상을 상대에게서 찾는 경향이 있다. 남성은 엄마를, 여성은 아빠를 상대에게서 찾는다. L31에 의하면 이 구조에서 벗어나 스스로 부모가 되는 구조로 전환되지 않으면 두 아이가 서로에게 부모를 요구하는 지속 불가능한 구조가 된다. 두 사람 모두 채워지기를 기다리고, 아무도 먼저 내어주지 않는다.\n\n역할 전환이란 D4(부모성), 즉 아무것도 돌려받기를 기대하지 않고 희생하는 상태로 전환되는 것이다. 이것은 성숙(D1)의 완성형이다.\n\n→ 역할 전환이 되려면 성숙이 선행되어야 한다."}, {"title": "역방향 2: 역할 전환이 되려면 필요한 것 기반 선택이 필요하다", "body": "역할 전환은 결혼 안에서 일어나는 변화이다. 그런데 역할 전환이 일어날 수 있는 관계가 되려면 처음 선택 자체가 올바른 기반 위에 있어야 한다.\n\nD6에 의하면 원하는 것은 자극과 쾌감에 기반한 선호이고, 필요한 것은 나의 부족함과 상대의 강점이 맞물리는 구조적 적합성이다. L29에 의하면 원하는 것으로 시작한 관계는 D19의 소진 구조에 따라 자극이 줄어들면 관계의 근거를 잃는다. 자극이 사라진 자리에 부모성(D4)이 들어설 수 없다. 역할 전환은 자극이 아닌 구조적 적합성 위에서만 가능하다.\n\n그렇다면 필요한 것을 기준으로 선택하려면 무엇을 알아야 하는가?\n\n첫째, D19를 알아야 한다. 도파민 자극을 행복으로 착각하는 사람은 끌림을 기준으로 선택한다. D19의 구조를 알아야 강렬한 끌림이 D2가 아님을 안다.\n\n둘째, D8을 알아야 한다. 상호보완적 파트너십이 무엇인지 알아야 나의 부족함과 상대의 강점이 맞물리는 것을 기준으로 선택할 수 있다. 이것을 모르면 C13이 경고하듯 상대의 다름을 결핍으로 오독하고 자기 기준을 강요하게 된다.\n\n셋째, D14(인정욕구)의 구조를 알아야 한다. 인정욕이 강한 사람은 상대를 파트너가 아닌 자신을 확인해주는 거울로 삼는다. L7에 의하면 인정욕이 지나치면 자신의 가치 판단 기준이 타인에게 이동하고, 상대의 반응에 따라 자존감이 흔들리는 만성 불안 상태가 된다. T4에 의하면 인정욕에 기반한 관계는 역설적으로 자기를 타인에게 종속시킨다. 이 상태에서는 D6의 필요한 것 기반 선택이 구조적으로 불가능하다.\n\n넷째, L26과 L27을 알아야 한다. 사람마다 소통 코드가 다르다. 관계 유지를 위한 간접적 소통이 기본값인 사람과 정보 교환을 위한 직접적 소통이 기본값인 사람이 만나면, 서로의 의도를 구조적으로 오독하게 된다. 이것을 모르면 상대의 간접 신호를 무관심으로, 상대의 직접 표현을 공격으로 읽는다. 소통 코드의 차이를 성격 결함이나 감정 문제로 오진하는 순간, 선택 판단 자체가 왜곡된다.\n\n→ 필요한 것 기반 선택이 되려면 목적 자각이 선행되어야 한다."}, {"title": "역방향 3: 필요한 것 기반 선택이 되려면 목적 자각이 필요하다", "body": "필요한 것을 알려면 자기 자신을 알아야 한다. 내가 무엇이 부족한지, 어떤 방향으로 나아가고 싶은지를 모르는 사람은 필요한 것을 판단할 기준이 없다.\n\nD16에 의하면 인생의 목적이란 각 사람에게 고유한 삶의 방향을 발견하고 이루어가는 과정이다. P1a에 의하면 모든 사람에게는 고유한 목적이 있다. 이 방향을 모르는 사람은 자기 자신을 모르는 것이다. 자기 자신을 모르는 사람은 누가 자신에게 필요한 사람인지 판단할 수 없다.\n\nL34에 의하면 목적 없는 결혼은 방향을 잃는다. 잘 되고 있는지 판단할 기준이 없기 때문이다. 결혼이 목적을 향한 동행이 되려면 먼저 그 목적이 있어야 한다.\n\n그런데 목적 발견은 어디서 막히는가? L44에 의하면 고유한 목적은 욕심과 반대 방향에 있다. 욕심은 D19의 도파민 구조와 결합해서 끊임없이 더 큰 자극을 향해 이동한다. L39(성취 중심의 삶은 허무로 향한다)가 보여주듯, 성취 중심의 삶은 결핍을 키우며 허무로 향한다. T25에 의하면 허무의 반대편은 더 큰 성취가 아니라 고유한 방향의 발견이다. L38이 경고하듯, 세상이 각 단계마다 약속하는 것은 D2의 행복이 아니라 D19의 도파민 자극이다. 결혼 자체를 도파민 자극으로 기대하는 사람은 결혼 후 자극이 소진될 때 결혼 자체가 문제라고 오해한다.\n\n→ 목적 자각이 되려면 성숙이 선행되어야 한다."}, {"title": "역방향 4: 목적 자각이 되려면 성숙이 필요하다", "body": "목적을 발견하려면 자아를 내려놓아야 한다(D13). 자아를 내려놓는다는 것은 억지로 모든 것을 통제하려는 시도를 멈추고 통제할 수 없는 것을 받아들이며 적절한 때를 기다리는 상태이다.\n\n그런데 A4에 의하면 두려움의 주된 뿌리는 불확실성이다. 통제하려는 충동은 불확실성에 대한 두려움에서 온다. D12(강한 자아)는 겉으로는 강해 보이지만 실제로는 불확실성에 대한 강한 두려움의 다른 표현이다. L2에 의하면 강한 자아는 역설적으로 가장 취약하다. 이것을 모르면 통제 충동을 강인함이라고 착각한다.\n\nL14의 역설을 알아야 한다. 두려움은 없애려 할수록 커지고, 받아들이면 줄어든다. 이것은 A4를 알아야만 납득된다. 두려움의 뿌리가 불확실성임을 알면, 불확실성을 제거하려는 시도를 멈추는 것이 두려움을 줄이는 유일한 경로임이 이해된다. 납득이 없으면 변화도 없다(D7).\n\nA3도 알아야 한다. 인간의 시간(Kronos)과 적절한 때(Kairos)는 다르다. 씨앗을 심고 싶다고 겨울에 심을 수 없듯, 상대가 변화하기를 내가 원하는 속도로 강요할 수 없다. A3를 모르면 조급함이 생기고, C7이 경고하듯 조급함은 때를 강요하는 행위가 된다. 관계 안에서 때를 강요하면 상대는 닫히고 멀어진다.\n\n성숙은 반복으로 굳어진다(L18). 한 번의 결심으로 이루어지지 않는다. 그리고 결혼 생활을 지속하면 반드시 상처가 쌓인다. L37(용서)에 의하면 용서하지 못하는 상태는 상대에 대한 분노가 아니라 같은 상처가 반복될 것이라는 두려움을 붙들고 있는 상태이다. 이 짐이 여유(D3)를 잠식한다. 용서는 상대를 위한 것이 아니라 내 여유와 성숙을 지키기 위한 행위이다. 이것을 모르면 쌓인 상처가 결혼을 서서히 무너뜨린다.\n\n→ 성숙이 되려면 여유가 선행되어야 한다."}, {"title": "역방향 5: 성숙이 되려면 여유가 필요하다", "body": "성숙은 여유(D3)를 전제로 한다. 여유란 시간·돈·심리적 자원이 자신의 필요를 넘어서 존재하는 상태이다. L12에 의하면 여유가 없는 사람은 자기 자원을 지키는 데 급급하므로 손해를 감수하는 구조 자체가 불가능하다. 성숙은 손해를 감수하는 능력이므로, 여유(D3) 없이는 성숙 자체가 작동하지 않는다.\n\n그렇다면 여유는 어디서 오는가?\n\n여유는 두려움과 직접적으로 연결되어 있다. A4에 의하면 두려움의 뿌리는 불확실성이다. 불확실성에 대한 두려움이 클수록 모든 자원이 통제와 회피에 소진된다. 심리적 여유가 사라진다. 또한 D19 상태에서는 자극이 없을 때 생기는 공허함을 채우기 위해 지속적으로 에너지와 시간이 소진된다. 도파민을 찾고 의지하는 구조가 여유를 구조적으로 갉아먹는다.\n\n여유를 만들려면 이 두 가지 구조를 알아야 한다. A4를 알아야 두려움을 통제로 해소하려는 시도를 멈출 수 있다. D19를 알아야 도파민 자극을 쫓는 생활 구조를 바꿀 수 있다.\n\n지금 여유가 전혀 없는 사람은 어디서 시작하는가? L13이 답한다. 완전한 여유를 기다릴 필요가 없다. 지금 가진 것 안에서 가능한 가장 작은 손해 감수부터 시작하면 그 작은 수용이 작은 여유를 낳고, 그 여유가 더 큰 수용을 가능하게 한다. C8이 말하듯, 시작할 준비가 되기를 기다리면 영원히 시작하지 못한다.\n\n→ 여유를 만들려면 인생의 원리를 알아야 한다."}, {"title": "역방향 종착점: 결국 인생의 원리 앞에 선다", "body": "지금까지의 역방향 추적을 정리하면 다음과 같다.\n\n> 행복한 결혼 ← 역할 전환 ← 필요한 것 기반 선택 ← 목적 자각 ← 성숙 ← 여유 ← 인생의 원리\n\n각 단계에서 필요한 원리들을 열거하면:\n\n- A1 — 세상은 순서대로 움직인다. 시퀀스를 건너뛸 수 없다.\n- A2 — 모든 선택에는 비용이 따른다. 상대의 비용을 받아들여야 갈등이 사라진다.\n- A3 — 인간의 시간과 적절한 때는 다르다. 조급함이 관계를 망친다.\n- A4 — 두려움의 뿌리는 불확실성이다. 두려움을 다루는 방향이 달라진다.\n- A6 — 세상의 원리는 하나이다. 다른 소통 방식은 틀린 것이 아니라 다른 각도이다.\n- P1a — 나에게 고유한 목적이 있다. 결혼이 목적을 향한 동행이 된다.\n- D2 vs D19 — 행복과 도파민 자극은 다르다. 끌림을 사랑으로 착각하지 않는다.\n- D6 — 원하는 것과 필요한 것의 차이. 올바른 선택 기준을 갖는다.\n- D7 — 납득. 소통 코드의 차이를 납득해야만 관계 변화가 시작된다.\n- D8 — 상호보완적 파트너십. 상대의 다름을 자원으로 본다.\n\n이 원리들은 서로 연결되어 있다. 하나를 알면 다른 것이 보이고, 다른 것을 알면 또 다른 것이 연결된다. 결혼을 잘 하고 싶다는 질문에서 출발해서 거슬러 올라가면 결국 인생 전체의 구조 앞에 서게 된다."}, {"title": "결론", "body": "원리를 모르는 상태에서 결혼에 들어가는 사람은 다음 네 가지 실패를 구조적으로 반복한다.\n\n첫째, 도파민 자극을 사랑으로 착각해서 자극이 소진될 때 관계가 끝났다고 판단한다.\n둘째, 여유 없이 들어가 손해 감수를 거부하며 상대에게 요구만 한다.\n셋째, 상대에게서 부모를 찾다가 서로가 소진된다.\n넷째, 쌓이는 상처를 용서하지 못해 여유가 잠식되고 사랑의 구조적 기반을 잃는다.\n다섯째, 서로의 소통 코드가 다르다는 것을 모르고 상대의 간접 신호를 무관심으로, 상대의 직접 표현을 공격으로 오독하면서 관계가 서서히 닫힌다.\n\n이 네 가지 실패는 나쁜 의도에서 오지 않는다. 좋은 의도를 가지고 있어도 원리를 모르면 구조적으로 발생한다.\n\n인생의 원리를 아는 것은 결혼을 잘 하기 위한 준비가 아니라, 행복한 결혼이 성립하기 위한 구조적 전제 조건이다. □"}];

  {key:"C",label:"Corollaries",ko:"따름정리",emoji:"✦",accent:"#a29bfe",bg:"#0a0720"},
];

var LAYERS=[
  {id:"Axioms",ko:"공리",desc:"증명 없이 받아들이는 가장 기본적인 원리. 이 시스템의 모든 것이 여기서 출발한다.",color:"#e94560",count:6},
  {id:"Postulates",ko:"공준",desc:"공리에서 도출되지 않지만 신앙적으로 받아들이는 전제. P1b는 선택적이다.",color:"#0f9fcf",count:2},
  {id:"Definitions",ko:"정의",desc:"시스템 안에서 쓰이는 핵심 개념의 의미를 고정한다. 읽기 전에 먼저 확인할 것.",color:"#60c3bc",count:20},
  {id:"Observations",ko:"관찰",desc:"경험적으로 관찰되는 패턴. 증명되지 않지만 시스템의 배경을 구성한다.",color:"#f0a500",count:14},
  {id:"Lemmas",ko:"보조정리",desc:"공리와 정의에서 도출된 중간 명제. 정리를 위한 논리적 디딤돌.",color:"#4a69bd",count:49},
  {id:"Theorems",ko:"정리",desc:"Lemmas에서 도출되는 주요 결론. 시스템의 핵심 주장들.",color:"#e17055",count:30},
  {id:"Corollaries",ko:"따름정리",desc:"Theorems에서 자연스럽게 따라오는 실천적 결론.",color:"#a29bfe",count:23},
  {id:"Proofs",ko:"증명",desc:"역방향 추적으로 특정 명제를 증명한다. Proof 1: 행복한 결혼의 구조적 전제.",color:"#f5a623",count:1},
  {id:"Scholia",ko:"주해",desc:"논쟁적 명제에 대한 추가 설명, 반대 입장, 적용 범위 경고.",color:"#74b9ff",count:8},
];

var HOWTO=[
  {num:"01",title:"Definitions부터 읽는다",desc:"이 시스템의 핵심 개념들은 일상적 의미와 다르게 정의된다. D2(행복), D3(여유), D5(사랑), D19(도파민 중독)의 정의를 먼저 확인하면 이후 논증이 훨씬 명확해진다."},
  {num:"02",title:"인용 번호를 눌러서 확인한다",desc:"모든 명제는 'A4에 의해', 'L12에 의하면' 같은 인용 번호로 근거를 밝힌다. 번호를 누르면 해당 내용이 팝업으로 뜬다. 팝업 안의 번호도 누를 수 있다."},
  {num:"03",title:"Proof 1이 전체 지도이다",desc:"행복한 결혼 → 역할 전환 → 선택 → 목적 자각 → 성숙 → 여유 → 인생의 원리 순으로 역방향 추적한다. 시스템 전체 구조를 한 번에 파악할 수 있다."},
  {num:"04",title:"P1b는 선택적 전제이다",desc:"P1b(목적은 절대자가 설계했다)는 신앙적 공준이다. 받아들이지 않아도 개인론·성숙론·관계론·결혼론의 대부분이 독립적으로 작동한다."},
  {num:"05",title:"Scholia가 반론과 한계를 다룬다",desc:"Scholia는 각 명제의 적용 한계, 반대 입장, 오용 가능성을 다룬다. O3·O4의 적용 범위(S1), 고통 명제의 한계(S6), SCD 예외(S7) 등을 확인한다."},
  {num:"06",title:"논리 흐름은 번호 순서를 따른다",desc:"A(공리) → P(공준) → D(정의) → L(보조정리) → T(정리) → C(따름정리)의 순서가 논리적 의존 관계이다. 번호가 낮을수록 더 기본적인 전제이다."},
];

// 전체 참조 맵
var REF_MAP={};
['A','P','D','O','L','T','C'].forEach(function(k){
  (DATA[k]||[]).forEach(function(item){REF_MAP[item.id]=item;});
});

// 상태
var state={
  view:'intro', // intro|main|proof
  section:'A',
  cardIdx:0,
  filter:null,
  popupStack:[],
  proofStep:0,
  introTab:'layers',
};

function setState(patch){
  Object.assign(state,patch);
  render();
}

function getSec(){return SECTIONS.find(function(s){return s.key===state.section;})||SECTIONS[0];}
function getCards(){
  var all=DATA[state.section]||[];
  return state.filter?all.filter(function(c){return c.section===state.filter;}):all;
}

// HTML 헬퍼
function h(tag,attrs,children){
  var el=document.createElement(tag);
  if(attrs) Object.keys(attrs).forEach(function(k){
    if(k==='style'&&typeof attrs[k]==='object'){
      Object.assign(el.style,attrs[k]);
    } else if(k.startsWith('on')){
      el.addEventListener(k.slice(2).toLowerCase(),attrs[k]);
    } else if(k==='className'){
      el.className=attrs[k];
    } else {
      el.setAttribute(k,attrs[k]);
    }
  });
  if(children) [].concat(children).forEach(function(c){
    if(c==null) return;
    el.appendChild(typeof c==='string'?document.createTextNode(c):c);
  });
  return el;
}

function div(cls,children,extra){
  var el=document.createElement('div');
  if(cls) el.className=cls;
  if(extra) Object.keys(extra).forEach(function(k){
    if(k==='style') Object.assign(el.style,extra[k]);
    else if(k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(),extra[k]);
  });
  if(children)[].concat(children).forEach(function(c){
    if(c==null)return;
    el.appendChild(typeof c==='string'?document.createTextNode(c):c);
  });
  return el;
}

function btn(cls,text,onClick,extra){
  var el=h('button',Object.assign({className:cls,onClick:onClick},extra||{}),[text]);
  return el;
}

// 참조 번호를 클릭 가능한 span으로 변환
function linkify(text, accent){
  var parts=text.split(/(?<![A-Za-z])([ADLTCOP][0-9]+[ab]?)(?![A-Za-z0-9])/);
  var frag=document.createDocumentFragment();
  parts.forEach(function(p,i){
    if(REF_MAP[p]){
      var sp=document.createElement('span');
      sp.className='ref';
      sp.style.setProperty('--accent', accent||'#888');
      sp.textContent=p;
      sp.onclick=function(e){e.stopPropagation();state.popupStack.push(REF_MAP[p]);render();};
      frag.appendChild(sp);
    } else {
      frag.appendChild(document.createTextNode(p));
    }
  });
  return frag;
}

function makePopup(accent){
  if(!state.popupStack.length) return null;
  var item=state.popupStack[state.popupStack.length-1];
  var depth=state.popupStack.length;

  var overlay=div('overlay',null,{onClick:function(){state.popupStack=[];render();}});
  var popup=div('popup');
  popup.style.setProperty('--accent',accent||'#888');
  popup.onclick=function(e){e.stopPropagation();};

  // header
  var ph=div('popup-header');
  var pid=div(null);
  var pidSpan=h('span',{className:'popup-id',style:{color:accent||'#888'}},[item.id]);
  pid.appendChild(pidSpan);
  if(item.section){var ps=h('span',{className:'popup-section'},[item.section]);pid.appendChild(ps);}
  ph.appendChild(pid);
  var pbtns=div('popup-btns');
  if(depth>1){
    var backBtn=btn('popup-back','← 뒤로',function(){state.popupStack.pop();render();});
    pbtns.appendChild(backBtn);
  }
  var closeBtn=btn('popup-close','×',function(){state.popupStack=[];render();});
  pbtns.appendChild(closeBtn);
  ph.appendChild(pbtns);
  popup.appendChild(ph);

  // title
  var pt=h('div',{className:'popup-title'},[item.title]);
  popup.appendChild(pt);

  // divider
  var pd=div('popup-divider');
  pd.style.background=accent+'55';
  popup.appendChild(pd);

  // body with linkify
  var pb=div('popup-body');
  pb.appendChild(linkify(item.body, accent));
  popup.appendChild(pb);

  return [overlay, popup];
}

// HEADER
function makeHeader(){
  var hd=div('header');
  hd.innerHTML='<div class="header-sub">DE NATURA HOMINIS ET FELICITATIS</div><h1 class="header-title">인간 본성과 행복, 그리고 결합에 관하여</h1>';
  return hd;
}

// NAV
function makeNav(){
  var nav=div('nav');
  var sec=getSec();
  SECTIONS.forEach(function(s){
    var b=btn('nav-btn'+(state.view==='main'&&state.section===s.key?' active':''),
      s.emoji+' '+s.label,
      function(){setState({view:'main',section:s.key,cardIdx:0,filter:null});});
    b.style.setProperty('--accent',s.accent);
    nav.appendChild(b);
  });
  var proofBtn=btn('nav-btn'+(state.view==='proof'?' active':''),
    '🔍 Proof',function(){setState({view:'proof',proofStep:0});});
  proofBtn.style.setProperty('--accent','#f5a623');
  nav.appendChild(proofBtn);
  var introBtn=btn('nav-btn'+(state.view==='intro'?' active':''),
    '📖 Intro',function(){setState({view:'intro',introTab:'layers'});});
  introBtn.style.setProperty('--accent','#74b9ff');
  nav.appendChild(introBtn);
  return nav;
}

// INTRO VIEW
function renderIntro(){
  var app=document.getElementById('app');
  app.innerHTML='';
  var frag=document.createDocumentFragment();
  frag.appendChild(makeHeader());
  frag.appendChild(makeNav());

  var wrap=div('intro-wrap');

  // top card
  var ic=div('intro-card');
  ic.innerHTML='<div style="font-size:10px;letter-spacing:.2em;color:#444;margin-bottom:10px">INTRODUCTION</div>'
    +'<h2 style="font-size:20px;font-weight:normal;color:#e0d8d0;line-height:1.5;margin-bottom:14px">이 문서를 읽는 방법</h2>'
    +'<div style="width:30px;height:1px;background:#333;margin-bottom:14px"></div>'
    +'<p style="font-size:13px;line-height:1.9;color:#585048">이 문서는 스피노자의 기하학적 방법을 모델로 삼아 인간 본성, 행복, 결합에 관한 명제들을 공리에서 따름정리까지 논리적으로 전개한다. 각 명제는 선행하는 명제들에 의해 도출되며, 인용 번호를 통해 근거를 추적할 수 있다.</p>';
  wrap.appendChild(ic);

  // tabs
  var tabs=div('intro-tabs');
  var t1=btn('intro-tab'+(state.introTab==='layers'?' layers':''),'📐 계층 구조',function(){setState({introTab:'layers'});});
  var t2=btn('intro-tab'+(state.introTab==='howto'?' howto':''),'🔍 읽기 방법',function(){setState({introTab:'howto'});});
  tabs.appendChild(t1);tabs.appendChild(t2);
  wrap.appendChild(tabs);

  if(state.introTab==='layers'){
    var flowColors=['#e94560','#0f9fcf','#60c3bc','#f0a500','#4a69bd','#e17055','#a29bfe','#f5a623','#74b9ff'];
    var flowNames=['A','P','D','O','L','T','C','Proof','Scholia'];

    LAYERS.forEach(function(layer){
      var li=div('layer-item');
      var iconWrap=div(null);
      var icon=div('layer-icon');
      icon.style.background='color-mix(in srgb,'+layer.color+' 10%,transparent)';
      icon.style.border='1px solid color-mix(in srgb,'+layer.color+' 20%,transparent)';
      icon.style.color=layer.color;
      icon.textContent=layer.id.substring(0,3).toUpperCase();
      iconWrap.appendChild(icon);
      var cnt=div('layer-count');cnt.textContent=layer.count+'개';
      iconWrap.appendChild(cnt);
      li.appendChild(iconWrap);
      var info=div(null);
      var nm=div(null);
      nm.innerHTML='<span class="layer-name">'+layer.id+'</span><span class="layer-ko">'+layer.ko+'</span>';
      info.appendChild(nm);
      var dc=div('layer-desc');dc.textContent=layer.desc;
      info.appendChild(dc);
      li.appendChild(info);
      wrap.appendChild(li);
    });

    var fb=div('flow-box');
    var fl=div('flow-label');fl.textContent='논리적 의존 순서';fb.appendChild(fl);
    var fi=div('flow-items');
    flowNames.forEach(function(name,i){
      var it=div('flow-item');
      it.style.background='color-mix(in srgb,'+flowColors[i]+' 10%,transparent)';
      it.style.border='1px solid color-mix(in srgb,'+flowColors[i]+' 20%,transparent)';
      it.style.color=flowColors[i];
      it.textContent=name;
      fi.appendChild(it);
      if(i<flowNames.length-1){var ar=div('flow-arrow');ar.textContent='→';fi.appendChild(ar);}
    });
    fb.appendChild(fi);wrap.appendChild(fb);
  } else {
    HOWTO.forEach(function(item){
      var hi=div('howto-item');
      var num=div('howto-num');num.textContent=item.num;hi.appendChild(num);
      var info=div(null);
      var ht=div('howto-title');ht.textContent=item.title;info.appendChild(ht);
      var hd=div('howto-desc');hd.textContent=item.desc;info.appendChild(hd);
      hi.appendChild(info);
      wrap.appendChild(hi);
    });
  }

  var sb=btn('start-btn','읽기 시작 →',function(){setState({view:'main',section:'A',cardIdx:0});});
  wrap.appendChild(sb);
  frag.appendChild(wrap);
  app.appendChild(frag);
}

// PROOF VIEW
function renderProof(){
  var app=document.getElementById('app');
  app.innerHTML='';
  var frag=document.createDocumentFragment();
  frag.appendChild(makeHeader());
  frag.appendChild(makeNav());

  var wrap=div('proof-wrap');
  var pc=div('proof-card');

  var pl=div('proof-label');pl.textContent='PROOF 1';pc.appendChild(pl);
  var ps=div('proof-subtitle');ps.textContent='인생의 원리를 알아야 행복한 결혼 생활을 할 수 있다';pc.appendChild(ps);

  // step tabs
  var ptabs=div('proof-tabs');
  PROOF.forEach(function(s,i){
    var short=s.title.length>12?s.title.substring(0,12)+'…':s.title;
    var tb=btn('proof-tab'+(state.proofStep===i?' active':''),short,function(){setState({proofStep:i});});
    ptabs.appendChild(tb);
  });
  pc.appendChild(ptabs);

  var step=PROOF[state.proofStep];
  if(step){
    var sl=div('proof-step-label');sl.textContent=step.title;pc.appendChild(sl);
    var sb2=div('proof-step-body');
    sb2.appendChild(linkify(step.body,'#f5a623'));
    pc.appendChild(sb2);
  }
  wrap.appendChild(pc);

  // prev/next
  var pn=div('proof-nav');
  var prevBtn=btn('proof-nav-btn','← 이전',function(){setState({proofStep:Math.max(0,state.proofStep-1)});});
  prevBtn.disabled=state.proofStep===0;
  var dots2=div('proof-dots');
  PROOF.forEach(function(_,i){
    var d=div('dot'+(state.proofStep===i?' active':''));
    d.style.width=state.proofStep===i?'14px':'5px';
    d.style.background=state.proofStep===i?'#f5a623':'#222';
    d.onclick=function(){setState({proofStep:i});};
    dots2.appendChild(d);
  });
  var nextBtn=btn('proof-nav-btn','다음 →',function(){setState({proofStep:Math.min(PROOF.length-1,state.proofStep+1)});});
  nextBtn.disabled=state.proofStep===PROOF.length-1;
  pn.appendChild(prevBtn);pn.appendChild(dots2);pn.appendChild(nextBtn);
  wrap.appendChild(pn);
  frag.appendChild(wrap);

  // popups
  var popups=makePopup('#f5a623');
  if(popups){popups.forEach(function(p){frag.appendChild(p);});}

  app.appendChild(frag);
}

// MAIN VIEW
function renderMain(){
  var app=document.getElementById('app');
  app.innerHTML='';
  var frag=document.createDocumentFragment();

  var sec=getSec();
  var cards=getCards();
  var idx=Math.min(state.cardIdx,Math.max(0,cards.length-1));
  var card=cards[idx];
  var subs=[];
  (DATA[state.section]||[]).forEach(function(c){if(c.section&&subs.indexOf(c.section)<0)subs.push(c.section);});

  // CSS var
  document.documentElement.style.setProperty('--accent',sec.accent);

  frag.appendChild(makeHeader());
  frag.appendChild(makeNav());

  // filters
  if(subs.length){
    var filters=div('filters');
    subs.forEach(function(sf){
      var fb=btn('filter-btn'+(state.filter===sf?' active':''),sf,function(){
        setState({filter:state.filter===sf?null:sf,cardIdx:0});
      });
      fb.style.setProperty('--accent',sec.accent);
      filters.appendChild(fb);
    });
    frag.appendChild(filters);
  }

  frag.appendChild(h('div',{className:'count'},[cards.length+'개'+(state.filter?' · '+state.filter:'')]));

  if(!card){app.appendChild(frag);return;}

  // card
  var cardEl=div('card');
  cardEl.style.setProperty('--accent',sec.accent);
  cardEl.style.setProperty('--bg',sec.bg);

  var badge=div('card-badge');
  badge.appendChild(h('span',{className:'card-badge-id'},[card.id]));
  badge.appendChild(h('span',{className:'card-badge-sep'},['·']));
  badge.appendChild(h('span',{className:'card-badge-label'},[sec.label+(card.section?' / '+card.section:'')]));
  cardEl.appendChild(badge);

  var title=h('h2',{className:'card-title'},[card.title]);
  cardEl.appendChild(title);
  cardEl.appendChild(div('card-divider'));

  var body=div('card-body');
  body.appendChild(linkify(card.body, sec.accent));
  cardEl.appendChild(body);

  var counter=div('card-counter');
  counter.textContent=(idx+1)+' / '+cards.length;
  cardEl.appendChild(counter);
  frag.appendChild(cardEl);

  // arrows + dots
  var arrowWrap=div('nav-arrows');
  var prevA=btn('arrow-btn','‹',function(){
    if(state.cardIdx<=0) setState({cardIdx:cards.length-1});
    else setState({cardIdx:state.cardIdx-1});
  });
  arrowWrap.appendChild(prevA);

  var dots=div('dots');
  var shown=Math.min(cards.length,40);
  for(var i=0;i<shown;i++){
    (function(i){
      var d=div('dot'+(idx===i?' active':''));
      d.style.width=idx===i?'14px':'4px';
      d.onclick=function(){setState({cardIdx:i});};
      dots.appendChild(d);
    })(i);
  }
  arrowWrap.appendChild(dots);

  var nextA=btn('arrow-btn','›',function(){
    if(state.cardIdx>=cards.length-1) setState({cardIdx:0});
    else setState({cardIdx:state.cardIdx+1});
  });
  arrowWrap.appendChild(nextA);
  frag.appendChild(arrowWrap);

  // grid
  var grid=div('grid');
  cards.forEach(function(c,i){
    var gi=div('grid-item'+(idx===i?' active':''));
    gi.style.setProperty('--accent',sec.accent);
    gi.appendChild(h('div',{className:'grid-item-id'},[c.id]));
    gi.appendChild(h('div',{className:'grid-item-title'},[c.title]));
    gi.onclick=function(){setState({cardIdx:i});};
    grid.appendChild(gi);
  });
  frag.appendChild(grid);

  frag.appendChild(h('div',{className:'footer'},['A → P → D → O → L → T → C → Proofs → Scholia']));

  // popups
  var popups=makePopup(sec.accent);
  if(popups){popups.forEach(function(p){frag.appendChild(p);});}

  app.appendChild(frag);
}

function render(){
  if(state.view==='intro') renderIntro();
  else if(state.view==='proof') renderProof();
  else renderMain();
}

render();
</script>
